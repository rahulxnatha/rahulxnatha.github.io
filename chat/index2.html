<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Chat | DOCS from Rahul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: '#1e293b', brandAccent: '#3b82f6', chatBg: '#f8fafc', darkChatBg: '#0f172a' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .message-bubble { position: relative; }
        .action-overlay { position: absolute; right: 0; bottom: -28px; display: none; }
        .message-bubble:hover .action-overlay { display: flex; gap: 4px; }
        .admin-scroll-area { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body class="font-sans antialiased text-slate-800 bg-slate-100 dark:bg-slate-900 h-screen overflow-hidden flex flex-col">

    <script>const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwlbU-gk06opysLnE2r7u2xBwpvlS1xFwZtZvOSKZQF6ypj5cmAf6oPaVSL3XmU4W2j/exec";</script>

    <!-- Header -->
    <header class="h-14 bg-white dark:bg-brand border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 shadow-sm flex-shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded bg-brandAccent flex items-center justify-center text-white font-bold"><i class="fa-solid fa-comments text-xs"></i></div>
            <h1 class="text-sm font-bold tracking-tight">Professional Chat</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="text-slate-500 w-8 h-8 hover:bg-slate-100 dark:hover:bg-slate-800 rounded"><i class="fa-solid fa-moon text-xs"></i></button>
            <div id="user-profile-badge" class="hidden text-xs font-bold border-l pl-3 ml-1">Admin</div>
        </div>
    </header>

    <!-- VIEW: LOGIN (Simplified) -->
    <div id="view-login" class="flex-1 flex items-center justify-center p-4">
        <form onsubmit="handleLogin(event)" class="bg-white dark:bg-brand p-6 rounded-2xl shadow-xl w-full max-w-xs border border-slate-200 dark:border-slate-800">
            <h2 class="text-lg font-bold mb-4 text-center">Login Portal</h2>
            <input type="password" id="login-key" class="w-full bg-slate-50 dark:bg-slate-900 border rounded-lg px-4 py-2 text-sm mb-4" placeholder="Access Key">
            <button type="submit" class="w-full bg-brandAccent text-white font-bold py-2 rounded-lg text-sm">Enter</button>
        </form>
    </div>

    <!-- VIEW: APP (Chat) -->
    <div id="view-app" class="hidden flex-1 overflow-hidden flex">
        <aside id="sidebar" class="w-64 bg-white dark:bg-brand border-r flex-col hidden md:flex">
            <div class="p-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b">Chats</div>
            <div id="chat-list" class="flex-1 overflow-y-auto p-2"></div>
        </aside>
        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-darkChatBg">
            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div id="input-area" class="p-3 bg-white dark:bg-brand border-t flex gap-2">
                <textarea id="message-input" class="flex-1 bg-slate-100 dark:bg-slate-900 rounded-lg px-3 py-2 text-sm focus:outline-none" rows="1"></textarea>
                <button onclick="sendMessage()" class="bg-brandAccent text-white px-4 rounded-lg text-sm"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>
    </div>

    <!-- VIEW: ADMIN -->
    <div id="view-admin" class="hidden flex-1 flex-col overflow-hidden bg-slate-50 dark:bg-slate-900 p-4 gap-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-full overflow-hidden">
            <!-- Users Card -->
            <div class="bg-white dark:bg-brand rounded-xl border flex flex-col h-full shadow-sm">
                <div class="px-4 py-3 border-b flex justify-between items-center flex-shrink-0">
                    <h3 class="font-bold text-sm">Authorized Users</h3>
                    <button onclick="adminAddUser()" class="text-[10px] bg-brandAccent text-white px-2 py-1 rounded">New User</button>
                </div>
                <div id="admin-user-list" class="admin-scroll-area p-2 space-y-2"></div>
            </div>
            <!-- Chats Card -->
            <div class="bg-white dark:bg-brand rounded-xl border flex flex-col h-full shadow-sm">
                <div class="px-4 py-3 border-b flex justify-between items-center flex-shrink-0">
                    <h3 class="font-bold text-sm">Chat Rooms</h3>
                    <button onclick="adminAddChat()" class="text-[10px] bg-brandAccent text-white px-2 py-1 rounded">Create Room</button>
                </div>
                <div id="admin-chat-list" class="admin-scroll-area p-2 space-y-2"></div>
            </div>
        </div>
    </div>
