                                        <div class="flex items-center gap-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onclick="adminMoveTile('${sec.id}', '${sub.id}', ${k}, -1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${k === 0 ? 'invisible' : ''}" title="Move Left/Up"><i class="fa-solid fa-arrow-left text-xs"></i></button>
                                            <button onclick="adminMoveTile('${sec.id}', '${sub.id}', ${k}, 1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${k === sub.tiles.length - 1 ? 'invisible' : ''}" title="Move Right/Down"><i class="fa-solid fa-arrow-right text-xs"></i></button>
                                        </div>
                                    </div>
                                    <div class="p-4 flex-1 flex flex-col min-w-0">
                                        <input type="text" onchange="adminUpdateTileProp('${sec.id}', '${sub.id}', '${tile.id}', 'heading', this.value)" value="${(tile.heading || '').replace(/"/g, '&quot;')}" placeholder="${getEffectiveHeading({...tile, heading: ''}).replace(/"/g, '&quot;')}" class="w-full bg-transparent border-none text-sm font-bold text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-0 placeholder-slate-400 dark:placeholder-slate-500 mb-4 p-0 overflow-x-auto whitespace-nowrap scroll-smooth" title="Tile Heading Override">
                                        <div class="flex items-center justify-between mt-auto">
                                            <div>${getVisBadge(tile.visibility || 'visible')}</div>
                                            <button onclick="adminNavigate(['${sec.id}', '${sub.id}', '${tile.id}'])" class="bg-secondary text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm hover:bg-blue-600 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-pen text-[10px]"></i> Edit Details</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('');
                            tilesHtml += `</div>`;
                        } else {
                            tilesHtml = `<div class="flex flex-col gap-3 p-4 bg-slate-50/50 dark:bg-slate-900/30">`;
                            tilesHtml += sub.tiles.map((tile, k) => `
                                <div class="flex justify-between items-center p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm hover:border-secondary transition-colors group">
                                    <div class="flex items-center flex-1 mr-4 gap-3 text-left min-w-0">
                                        <input type="checkbox" onclick="event.stopPropagation()" onchange="toggleAdminSelect('${tile.id}')" ${adminSelected[tile.id] ? 'checked' : ''} class="w-4 h-4 cursor-pointer flex-shrink-0 text-secondary rounded border-slate-300 focus:ring-secondary">
                                        <div class="w-8 h-8 rounded-lg bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 flex items-center justify-center flex-shrink-0 shadow-sm"><i class="fa-solid ${tile.icon} text-secondary text-xs"></i></div>
                                        <div class="flex-1 min-w-0">
                                            <input type="text" onchange="adminUpdateTileProp('${sec.id}', '${sub.id}', '${tile.id}', 'heading', this.value)" value="${(tile.heading || '').replace(/"/g, '&quot;')}" placeholder="${getEffectiveHeading({...tile, heading: ''}).replace(/"/g, '&quot;')}" class="w-full bg-transparent border-none text-sm font-semibold text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-0 placeholder-slate-400 dark:placeholder-slate-500 overflow-x-auto whitespace-nowrap scroll-smooth" title="Tile Heading Override">
                                        </div>
                                        ${getVisBadge(tile.visibility || 'visible')}
                                    </div>
                                    <div class="flex gap-2 text-left items-center flex-shrink-0">
                                        <div class="flex gap-1 border-r border-slate-200 dark:border-slate-600 pr-2 mr-1 opacity-100 lg:opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onclick="adminMoveTile('${sec.id}', '${sub.id}', ${k}, -1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-800 ${k === 0 ? 'invisible' : ''}" title="Move Up"><i class="fa-solid fa-arrow-up text-xs"></i></button>
                                            <button onclick="adminMoveTile('${sec.id}', '${sub.id}', ${k}, 1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-800 ${k === sub.tiles.length - 1 ? 'invisible' : ''}" title="Move Down"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                                        </div>
                                        <button onclick="adminNavigate(['${sec.id}', '${sub.id}', '${tile.id}'])" class="bg-secondary text-white px-3 py-1.5 rounded-lg text-xs font-semibold shadow-sm hover:bg-blue-600 transition-colors flex items-center gap-1.5"><i class="fa-solid fa-pen text-[10px]"></i> Edit</button>
                                    </div>
                                </div>
                            `).join('');
                            tilesHtml += `</div>`;
                        }
                    } else {
                        tilesHtml = `<p class="text-xs text-slate-500 italic p-4 mb-2">No tiles in this subsection.</p>`;
                    }

                    return `
                        <div class="mb-4 border border-slate-200 dark:border-slate-700 rounded-xl bg-white dark:bg-slate-800/50 text-left overflow-hidden shadow-sm">
                            <div class="flex items-center justify-between p-3 bg-slate-50/50 dark:bg-slate-900/50 border-b border-transparent data-[expanded=true]:border-slate-200 dark:data-[expanded=true]:border-slate-700 transition-colors group" data-expanded="${isSubExpanded}">
                                <div class="flex items-center gap-3 flex-1 mr-4">
                                    <input type="checkbox" onclick="event.stopPropagation()" onchange="toggleAdminSelect('${sub.id}')" ${adminSelected[sub.id] ? 'checked' : ''} class="w-4 h-4 ml-1 cursor-pointer flex-shrink-0 text-secondary rounded border-slate-300 focus:ring-secondary">
                                    <button onclick="toggleAdminExpand('${sub.id}')" class="text-slate-400 hover:text-secondary w-7 h-7 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded shadow-sm flex items-center justify-center transition-colors"><i class="fa-solid ${chevronSub} text-xs"></i></button>
                                    <input type="text" onchange="adminUpdateSub('${sec.id}', '${sub.id}', 'name', this.value)" value="${sub.name}" class="flex-1 bg-transparent border-none text-sm font-bold text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-0 placeholder-slate-400" placeholder="Subsection Name">
                                    ${getVisBadge(sub.visibility || 'visible')}
                                </div>
                                <div class="flex gap-3 items-center flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <div class="flex gap-1 pr-3 mr-1">
                                        <button onclick="adminMoveSub('${sec.id}', ${j}, -1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${j === 0 ? 'invisible' : ''}" title="Move Up"><i class="fa-solid fa-arrow-up text-xs"></i></button>
                                        <button onclick="adminMoveSub('${sec.id}', ${j}, 1)" class="text-slate-400 hover:text-secondary p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${j === sec.subsections.length - 1 ? 'invisible' : ''}" title="Move Down"><i class="fa-solid fa-arrow-down text-xs"></i></button>
                                    </div>
                                </div>
                            </div>
                            <div class="${isSubExpanded ? 'bg-white dark:bg-slate-800/20' : 'hidden'}">
                                ${tilesHtml}
                                <div class="px-4 pb-4">
                                    <button onclick="adminAddTile('${sec.id}', '${sub.id}')" class="text-xs border-2 border-dashed border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-secondary hover:text-secondary dark:hover:border-secondary transition-colors px-4 py-2.5 rounded-xl font-semibold w-full text-center flex items-center justify-center gap-2"><i class="fa-solid fa-plus"></i> Add New Tile</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="mb-6 border border-slate-300 dark:border-slate-600 rounded-2xl bg-white dark:bg-darkCard shadow-sm overflow-hidden text-left transition-all">
                        <div class="flex items-center justify-between p-5 bg-slate-100/50 dark:bg-slate-800/50 border-b border-transparent data-[expanded=true]:border-slate-200 dark:data-[expanded=true]:border-slate-700 transition-colors group" data-expanded="${isSecExpanded}">
                            <div class="flex items-center gap-4 flex-1 mr-4">
                                <input type="checkbox" onclick="event.stopPropagation()" onchange="toggleAdminSelect('${sec.id}')" ${adminSelected[sec.id] ? 'checked' : ''} class="w-5 h-5 cursor-pointer flex-shrink-0 text-secondary rounded border-slate-300 focus:ring-secondary">
                                <button onclick="toggleAdminExpand('${sec.id}')" class="text-slate-500 hover:text-secondary w-9 h-9 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 shadow-sm flex items-center justify-center rounded-lg transition-colors"><i class="fa-solid ${chevronSec}"></i></button>
                                <input type="text" onchange="adminUpdateSec('${sec.id}', 'name', this.value)" value="${sec.name}" class="flex-1 bg-transparent border-none font-extrabold text-xl text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-0 placeholder-slate-400" placeholder="Section Name">
                                ${getVisBadge(sec.visibility || 'visible')}
                            </div>
                            <div class="flex gap-3 items-center flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="flex gap-1 pr-3 mr-1">
                                    <button onclick="adminMoveSection(${i}, -1)" class="text-slate-400 hover:text-secondary p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${i === 0 ? 'invisible' : ''}" title="Move Up"><i class="fa-solid fa-arrow-up text-sm"></i></button>
                                    <button onclick="adminMoveSection(${i}, 1)" class="text-slate-400 hover:text-secondary p-1.5 rounded hover:bg-slate-200 dark:hover:bg-slate-700 ${i === appData.sections.length - 1 ? 'invisible' : ''}" title="Move Down"><i class="fa-solid fa-arrow-down text-sm"></i></button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="${isSecExpanded ? 'p-6 bg-white dark:bg-darkCard' : 'hidden'}">
                            <div class="mb-8 ml-2 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                                <label class="${adminLabelCls}"><i class="fa-regular fa-image mr-1 text-secondary"></i> Section Background Image</label>
                                <input type="text" onchange="adminUpdateSec('${sec.id}', 'bgImage', this.value)" value="${sec.bgImage || ''}" class="${adminInputCls} font-mono" placeholder="G-Drive Link or URL (Leave empty for solid color)">
                            </div>
                            
                            <div class="ml-4 pl-6 border-l-2 border-slate-200 dark:border-slate-700 relative">
                                <div class="absolute -left-[11px] top-0 bottom-0 flex flex-col justify-between py-2"><div class="w-5 h-px bg-slate-200 dark:bg-slate-700"></div><div class="w-5 h-px bg-slate-200 dark:bg-slate-700"></div></div>
                                <h4 class="text-sm font-bold mb-5 text-slate-500 dark:text-slate-400 uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-layer-group"></i> Subsections</h4>
                                ${subsHtml}
                                <button onclick="adminAddSub('${sec.id}')" class="mt-4 w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 transition-colors px-4 py-3 rounded-xl font-bold shadow-sm flex items-center justify-center gap-2"><i class="fa-solid fa-plus"></i> Add New Subsection</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="space-y-8 text-left w-full">
                    <!-- SEO Settings -->
                    <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-left relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-blue-500 to-indigo-500"></div>
                        <h3 class="text-xl font-bold mb-6 border-b border-slate-100 dark:border-slate-800 pb-3 flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-secondary flex items-center justify-center"><i class="fa-solid fa-magnifying-glass"></i></div> SEO & Social Meta Tags</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mb-6 bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border border-slate-200 dark:border-slate-700"><i class="fa-solid fa-circle-info text-secondary mr-1"></i> <strong>Note:</strong> WhatsApp & iMessage preview scrapers do not run JavaScript. To see previews on those apps, you must also manually copy these values into the raw <code class="bg-slate-200 dark:bg-slate-700 px-1 rounded">&lt;head&gt;</code> tags of your index.html file in your code editor.</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full text-left">
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Document Title</label><input type="text" onchange="appData.seo.title=this.value" value="${seo.title || appData.uiText.siteTitle}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Open Graph Image (G-Drive or URL)</label><input type="text" onchange="appData.seo.image=this.value" value="${seo.image || ''}" class="${adminInputCls} font-mono" placeholder="Fallback to Hero Background"></div>
                            <div class="md:col-span-2 text-left space-y-1.5"><label class="${adminLabelCls}">Search Engine Description</label><textarea rows="3" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="appData.seo.description=this.value" class="auto-expand ${adminInputCls} resize-y">${seo.description || appData.hero.bio}</textarea></div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-left relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-purple-500 to-pink-500"></div>
                        <h3 class="text-xl font-bold mb-6 border-b border-slate-100 dark:border-slate-800 pb-3 flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-purple-50 dark:bg-purple-900/30 text-purple-500 flex items-center justify-center"><i class="fa-solid fa-image"></i></div> Landing Page (Hero)</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full text-left">
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Full Name</label><input type="text" onchange="appData.hero.name=this.value" value="${hero.name}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Animated Sentences (Comma separated)</label><input type="text" onchange="appData.hero.animatedTitles=this.value" value="${hero.animatedTitles}" class="${adminInputCls}"></div>
                            <div class="md:col-span-2 text-left space-y-1.5"><label class="${adminLabelCls}">Short Bio</label><textarea rows="3" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="appData.hero.bio=this.value" class="auto-expand ${adminInputCls} resize-y">${hero.bio}</textarea></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Profile Pic (G-Drive Link)</label><input type="text" onchange="appData.hero.profileImageLink=this.value" value="${hero.profileImageLink}" class="${adminInputCls} font-mono"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Background Image (G-Drive Link)</label><input type="text" onchange="appData.hero.bgImageLink=this.value" value="${hero.bgImageLink}" class="${adminInputCls} font-mono"></div>
                        </div>
                    </div>
                    
                    <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-left relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-green-500 to-emerald-500"></div>
                        <h3 class="text-xl font-bold mb-6 border-b border-slate-100 dark:border-slate-800 pb-3 flex items-center gap-3"><div class="w-8 h-8 rounded-lg bg-green-50 dark:bg-green-900/30 text-green-500 flex items-center justify-center"><i class="fa-solid fa-address-card"></i></div> Global UI Text & Contact</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 w-full text-left">
                            <div class="text-left space-y-1.5 md:col-span-2"><label class="${adminLabelCls}">Branding Logo (G-Drive Link or Image URL)</label><input type="text" onchange="appData.uiText.brandLogo=this.value" value="${ui.brandLogo || ''}" placeholder="Leave empty to use Site Title text" class="${adminInputCls} font-mono"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Site Title (Fallback)</label><input type="text" onchange="appData.uiText.siteTitle=this.value" value="${ui.siteTitle}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Chatbot Name</label><input type="text" onchange="appData.uiText.botName=this.value" value="${ui.botName}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Contact Email</label><input type="text" onchange="appData.uiText.contactEmail=this.value" value="${ui.contactEmail}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Contact Phone</label><input type="text" onchange="appData.uiText.contactPhone=this.value" value="${ui.contactPhone}" class="${adminInputCls}"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">LinkedIn URL</label><input type="text" onchange="appData.uiText.linkedinLink=this.value" value="${ui.linkedinLink}" class="${adminInputCls} font-mono"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">GitHub URL</label><input type="text" onchange="appData.uiText.githubLink=this.value" value="${ui.githubLink}" class="${adminInputCls} font-mono"></div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-darkCard p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 text-left relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-orange-500 to-amber-500"></div>
                        <div class="flex justify-between items-center mb-8 border-b border-slate-100 dark:border-slate-800 pb-4 text-left flex-wrap gap-4">
                            <div class="flex items-center gap-4 flex-wrap">
                                <h3 class="text-2xl font-bold flex items-center gap-3"><div class="w-10 h-10 rounded-lg bg-orange-50 dark:bg-orange-900/30 text-orange-500 flex items-center justify-center"><i class="fa-solid fa-folder-tree"></i></div> Content Architecture</h3>
                                <div class="flex items-center gap-1 sm:gap-2 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg">
                                    <button onclick="adminToggleTileView()" class="text-xs px-3 py-1.5 rounded text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-700 hover:shadow-sm transition-all font-semibold" title="Toggle Grid/List View"><i class="fa-solid ${adminTileView === 'grid' ? 'fa-list' : 'fa-border-all'}"></i></button>
                                    <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 hidden sm:block"></div>
                                    <button onclick="adminExpandAll()" class="text-xs px-3 py-1.5 rounded text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-700 hover:shadow-sm transition-all font-semibold">Expand All</button>
                                    <button onclick="adminCollapseSubs()" class="text-xs px-3 py-1.5 rounded text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-700 hover:shadow-sm transition-all font-semibold">Collapse Subs</button>
                                    <button onclick="adminCollapseAll()" class="text-xs px-3 py-1.5 rounded text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-700 hover:shadow-sm transition-all font-semibold">Collapse All</button>
                                </div>
                            </div>
                            <button onclick="adminAddSection()" class="bg-secondary text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-blue-600 transition-colors flex items-center gap-2"><i class="fa-solid fa-plus"></i> Add Root Section</button>
                        </div>
                        ${sectionsHtml || '<div class="p-12 text-center border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl text-slate-500">No sections exist yet. Build your portfolio here!</div>'}
                    </div>
                </div>
            `;
        }

        function adminToggleRelatedTile(sId, ssId, tId, relatedId, isChecked) {
            const tile = appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId);
            const relatedPath = findTilePath(relatedId);
            const relTile = relatedPath ? relatedPath.tile : null;

            if(!tile.relatedTiles) tile.relatedTiles = [];
            if(relTile && !relTile.relatedTiles) relTile.relatedTiles = [];

            if(isChecked) {
                if(!tile.relatedTiles.includes(relatedId)) tile.relatedTiles.push(relatedId);
                // Bidirectional mapping
                if(relTile && !relTile.relatedTiles.includes(tId)) relTile.relatedTiles.push(tId);
            } else {
                tile.relatedTiles = tile.relatedTiles.filter(id => id !== relatedId);
                // Bidirectional removal
                if(relTile) relTile.relatedTiles = relTile.relatedTiles.filter(id => id !== tId);
            }
            adminRenderWithScroll();
        }

        function renderAdminTile(tile) {
            if (!tile) return '';
            let allTiles = [];
            appData.sections.forEach(s => s.subsections.forEach(ss => ss.tiles.forEach(t => {
                if (t.id !== tile.id) allTiles.push({id: t.id, name: getEffectiveHeading(t), sid: s.name, ssid: ss.name});
            })));

            let relatedHtml = `<div id="related-tiles-scroller" class="grid grid-cols-1 gap-2 max-h-[300px] overflow-y-auto p-3 border border-slate-300 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900/50 resize-y min-h-[150px]">`;
            allTiles.forEach(t => { 
                const isSel = (tile.relatedTiles || []).includes(t.id);
                relatedHtml += `
                <label class="flex items-start gap-3 p-3 rounded-lg border cursor-pointer transition-colors shadow-sm ${isSel ? 'bg-blue-50 dark:bg-blue-900/20 border-secondary' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600'}">
                    <input type="checkbox" onchange="adminToggleRelatedTile('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', '${t.id}', this.checked)" ${isSel ? 'checked' : ''} class="mt-1 w-4 h-4 text-secondary rounded border-slate-300 focus:ring-secondary">
                    <span class="flex-1 overflow-hidden">
                        <span class="font-semibold block truncate text-slate-800 dark:text-slate-200 text-sm mb-0.5">${t.name}</span>
                        <span class="text-[10px] text-slate-500 uppercase tracking-widest bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded inline-block truncate max-w-full" title="${t.sid} > ${t.ssid}">${t.sid} &gt; ${t.ssid}</span>
                    </span>
                </label>`; 
            });
            relatedHtml += `</div>`;

            let mediaHtml = (tile.mediaLinks || []).map((link, i) => `
                <div class="flex gap-3 mb-3 text-left">
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-link text-slate-400"></i></div>
                        <input type="text" onchange="adminUpdateMedia('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', ${i}, this.value)" value="${link.replace(/"/g, '&quot;')}" class="${adminInputCls} pl-10 font-mono" placeholder="G-Drive Link, Image URL, or <iframe src='...'></iframe>">
                    </div>
                    <button onclick="adminRemoveMedia('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', ${i})" class="bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 text-red-500 border border-red-200 dark:border-red-800 px-4 rounded-xl text-left transition-colors"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');

            return `
                <div class="h-full flex flex-col w-full bg-white dark:bg-darkCard overflow-hidden">
                    <div class="flex justify-between items-center p-4 border-b border-slate-200 dark:border-slate-800 shrink-0 shadow-sm z-10 bg-white dark:bg-darkCard">
                        <h3 class="text-lg font-bold text-left flex items-center gap-3"><div class="w-8 h-8 bg-slate-100 dark:bg-slate-800 rounded-lg flex items-center justify-center text-slate-500"><i class="fa-solid fa-pen-nib text-sm"></i></div> Edit Tile Details</h3>
                        <button onclick="adminNavigate([])" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    
                    <div id="admin-side-pane-scroller" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 text-left w-full">
                        <div class="text-left bg-blue-50 dark:bg-slate-800/50 p-4 rounded-xl border border-blue-100 dark:border-slate-700">
                            <label class="${adminLabelCls} text-secondary"><i class="fa-solid fa-rectangle-ad mr-1"></i> Top Banner Media (Optional)</label>
                            <input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'banner', this.value)" value="${(tile.banner || '').replace(/"/g, '&quot;')}" class="${adminInputCls} font-mono" placeholder="YouTube link, G-Drive link, or Image URL">
                            <p class="text-xs text-slate-500 mt-2"><i class="fa-solid fa-info-circle mr-1"></i> Adding a banner automatically expands this tile to span the full width.</p>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Tile Heading Override (Optional)</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'heading', this.value)" value="${tile.heading || ''}" class="${adminInputCls} font-bold text-lg" placeholder="Leave empty to auto-generate"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Role / Title</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'role', this.value)" value="${tile.role || tile.subtitle || ''}" class="${adminInputCls}" placeholder="e.g. Mechanical Engineer"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Base Subject / Major</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'baseSubject', this.value)" value="${tile.baseSubject || ''}" class="${adminInputCls}" placeholder="e.g. Mechanical Engineering"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Specialisation / Minor</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'specialisation', this.value)" value="${tile.specialisation || ''}" class="${adminInputCls}" placeholder="e.g. Robotics"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Employer / Organization</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'employer', this.value)" value="${tile.employer || ''}" class="${adminInputCls}" placeholder="e.g. Cyient"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Employer Official URL</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'employerUrl', this.value)" value="${tile.employerUrl || ''}" class="${adminInputCls} font-mono text-sm" placeholder="https://..."></div>
                            <div class="flex gap-4">
                                <div class="text-left space-y-1.5 flex-1"><label class="${adminLabelCls}">Score / GPA</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'score', this.value)" value="${tile.score || ''}" class="${adminInputCls}" placeholder="e.g. 7.5"></div>
                                <div class="text-left space-y-1.5 flex-1"><label class="${adminLabelCls}">Max Score</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'maxScore', this.value)" value="${tile.maxScore || ''}" class="${adminInputCls}" placeholder="e.g. 10.0"></div>
                            </div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Date / Timeline</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'date', this.value)" value="${tile.date || ''}" class="${adminInputCls}" placeholder="e.g. 2021 - 2023"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Location</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'location', this.value)" value="${tile.location || ''}" class="${adminInputCls}" placeholder="e.g. Hyderabad, India"></div>
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Icon (FontAwesome)</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'icon', this.value)" value="${tile.icon || 'fa-cube'}" class="${adminInputCls} font-mono" placeholder="e.g. fa-rocket"></div>
                            
                            <div class="text-left space-y-1.5">
                                <label class="${adminLabelCls}">Card Description (Short snippet)</label>
                                <textarea rows="3" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'description', this.value)" class="auto-expand ${adminInputCls} resize-y">${tile.description || ''}</textarea>
                            </div>
                            
                            <div class="text-left space-y-1.5">
                                <label class="${adminLabelCls}">Tab Detailed Content (Side pane text)</label>
                                <textarea rows="6" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'tabText', this.value)" class="auto-expand ${adminInputCls} resize-y">${tile.tabText || ''}</textarea>
                            </div>
                            
                            <div class="text-left space-y-1.5"><label class="${adminLabelCls}">Background Image (G-Drive or URL)</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'bgImage', this.value)" value="${tile.bgImage || ''}" class="${adminInputCls} font-mono"></div>
                        </div>
                        
                        <div class="border-t border-slate-100 dark:border-slate-800 pt-6 text-left w-full">
                            <h4 class="text-base font-bold mb-4 text-left flex items-center gap-2"><i class="fa-solid fa-photo-film text-slate-400"></i> Media Attachments</h4>
                            ${mediaHtml}
                            <button onclick="adminAddMedia('${adminPath[0]}', '${adminPath[1]}', '${tile.id}')" class="text-sm font-bold bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 px-4 py-2.5 rounded-xl mt-2 text-left transition-colors flex items-center gap-2 w-full justify-center"><i class="fa-solid fa-plus"></i> Add Media Link</button>
                        </div>

                        <div class="border-t border-slate-100 dark:border-slate-800 pt-6 text-left w-full pb-8">
                            <h4 class="text-base font-bold mb-2 text-left flex items-center gap-2"><i class="fa-solid fa-link text-slate-400"></i> Metrics Pills Relations</h4>
                            <p class="text-xs text-slate-500 mb-4 leading-relaxed">Select tiles to generate clickable metrics pills below this card.</p>
                            ${relatedHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        // Admin mutators
        function adminRenderWithScroll() {
            const scroller = document.getElementById('admin-scroll-container');
            const scrollPos = scroller ? scroller.scrollTop : 0;
            
            const relScroller = document.getElementById('related-tiles-scroller');
            const relScrollPos = relScroller ? relScroller.scrollTop : 0;

            const sidePaneScroller = document.getElementById('admin-side-pane-scroller');
            const sidePaneScrollPos = sidePaneScroller ? sidePaneScroller.scrollTop : 0;

            renderApp();
            
            const newScroller = document.getElementById('admin-scroll-container');
            if (newScroller) newScroller.scrollTop = scrollPos;
            
            const newRelScroller = document.getElementById('related-tiles-scroller');
            if (newRelScroller) newRelScroller.scrollTop = relScrollPos;

            const newSidePaneScroller = document.getElementById('admin-side-pane-scroller');
            if (newSidePaneScroller) newSidePaneScroller.scrollTop = sidePaneScrollPos;
        }

        function adminBulkAction(action) {
            const ids = Object.keys(adminSelected);
            if (ids.length === 0) return;

            if (action === 'delete') {
                if (!confirm(`Are you sure you want to permanently delete ${ids.length} selected item(s)?`)) return;
                appData.sections = appData.sections.filter(s => !ids.includes(s.id));
                appData.sections.forEach(s => {
                    s.subsections = s.subsections.filter(ss => !ids.includes(ss.id));
                    s.subsections.forEach(ss => { ss.tiles = ss.tiles.filter(t => !ids.includes(t.id)); });
                });
            } 
            else if (['visible', 'hidden', 'archived'].includes(action)) {
                appData.sections.forEach(s => {
                    if (ids.includes(s.id)) s.visibility = action;
                    s.subsections.forEach(ss => {
                        if (ids.includes(ss.id)) ss.visibility = action;
                        ss.tiles.forEach(t => { if (ids.includes(t.id)) t.visibility = action; });
                    });
                });
            }
            else if (action === 'duplicate') {
                for (let i = appData.sections.length - 1; i >= 0; i--) {
                    const s = appData.sections[i];
                    if (ids.includes(s.id)) {
                        let clone = JSON.parse(JSON.stringify(s));
                        clone.id = generateId(); clone.name += " (Copy)";
                        clone.subsections.forEach(ss => { ss.id = generateId(); ss.tiles.forEach(t => t.id = generateId()); });
                        appData.sections.splice(i + 1, 0, clone);
                        continue; 
                    }
                    for (let j = s.subsections.length - 1; j >= 0; j--) {
                        const ss = s.subsections[j];
                        if (ids.includes(ss.id)) {
                            let clone = JSON.parse(JSON.stringify(ss));
                            clone.id = generateId(); clone.name += " (Copy)";
                            clone.tiles.forEach(t => t.id = generateId());
                            s.subsections.splice(j + 1, 0, clone);
                            continue;
                        }
                        for (let k = ss.tiles.length - 1; k >= 0; k--) {
                            const t = ss.tiles[k];
                            if (ids.includes(t.id)) {
                                let clone = JSON.parse(JSON.stringify(t));
                                clone.id = generateId();
                                if(clone.heading) clone.heading += " (Copy)";
                                ss.tiles.splice(k + 1, 0, clone);
                            }
                        }
                    }
                }
            }
            adminSelected = {};
            adminRenderWithScroll();
        }

        function adminUpdateSec(sId, prop, val) { appData.sections.find(s=>s.id===sId)[prop] = val; adminRenderWithScroll(); }
        function adminUpdateSub(sId, ssId, prop, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId)[prop] = val; adminRenderWithScroll(); }
        function adminUpdateTileProp(sId, ssId, tId, prop, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId)[prop] = val; adminRenderWithScroll(); }
        function adminAddSection() { appData.sections.push({id: generateId(), name: "New Section", bgImage: "", visibility: "visible", subsections: []}); adminRenderWithScroll(); }
        function adminAddSub(sId) { appData.sections.find(s=>s.id===sId).subsections.push({id: generateId(), name: "New Subsection", visibility: "visible", tiles: []}); adminRenderWithScroll(); }
        function adminAddTile(sId, ssId) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.push({id: generateId(), heading: "", role: "", baseSubject: "", specialisation: "", employer: "", employerUrl: "", score: "", maxScore: "", date: "", location: "", description: "", tabText: "", icon: "fa-cube", bgImage: "", banner: "", visibility: "visible", mediaLinks: [], relatedTiles: []}); adminRenderWithScroll(); }
        function adminDeleteSection(idx) { if(confirm("Delete section?")) { appData.sections.splice(idx, 1); adminRenderWithScroll(); } }
        function adminDeleteSub(sId, idx) { if(confirm("Delete subsection?")) { appData.sections.find(s=>s.id===sId).subsections.splice(idx, 1); adminRenderWithScroll(); } }
        function adminDeleteTile(sId, ssId, idx) { if(confirm("Delete tile?")) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.splice(idx, 1); adminRenderWithScroll(); } }
        
        function adminUpdateRelatedTiles(sId, ssId, tId, selectElem) { const selected = Array.from(selectElem.selectedOptions).map(opt => opt.value); appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).relatedTiles = selected; adminRenderWithScroll(); }
        function adminAddMedia(sId, ssId, tId) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks.push(""); adminRenderWithScroll(); }
        function adminUpdateMedia(sId, ssId, tId, idx, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks[idx] = val; adminRenderWithScroll(); }
        function adminRemoveMedia(sId, ssId, tId, idx) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks.splice(idx, 1); adminRenderWithScroll(); }

        function adminMoveSection(idx, dir) {
            if (idx + dir < 0 || idx + dir >= appData.sections.length) return;
            const temp = appData.sections[idx];
            appData.sections[idx] = appData.sections[idx + dir];
            appData.sections[idx + dir] = temp;
            adminRenderWithScroll();
        }

        function adminMoveSub(sId, idx, dir) {
            const sec = appData.sections.find(s => s.id === sId);
            if (idx + dir < 0 || idx + dir >= sec.subsections.length) return;
            const temp = sec.subsections[idx];
            sec.subsections[idx] = sec.subsections[idx + dir];
            sec.subsections[idx + dir] = temp;
            adminRenderWithScroll();
        }

        function adminMoveTile(sId, ssId, idx, dir) {
            const sub = appData.sections.find(s => s.id === sId).subsections.find(ss => ss.id === ssId);
            if (idx + dir < 0 || idx + dir >= sub.tiles.length) return;
            const temp = sub.tiles[idx];
            sub.tiles[idx] = sub.tiles[idx + dir];
            sub.tiles[idx + dir] = temp;
            adminRenderWithScroll();
        }

        // ==========================================
        // 8. KICKOFF
        // ==========================================
        async function initApp() {
            profileBlobShape = generateRandomBlob(); 
            appData = await fetchPortfolioData();
            loadStateFromURL();
            
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        if(window._loaderAnimId) cancelAnimationFrame(window._loaderAnimId);
                        loader.remove();
                    }, 700);
                }
            }, 800);
            
            renderApp();
            window.addEventListener('hashchange', renderApp);
        }

        initApp();
    </script>
</body>
