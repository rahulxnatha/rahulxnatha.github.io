    <!-- Inline Script for Generative Full-Screen Canvas Loader -->
    <script>
        (function initAdvancedLoader() {
            const canvas = document.getElementById('loader-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h;
            let particles = [];
            
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const bgTrail = isDark ? 'rgba(15, 23, 42, 0.25)' : 'rgba(248, 250, 252, 0.25)';
            const lColorRGB = isDark ? '59, 130, 246' : '37, 99, 235';

            for(let i=0; i < (window.innerWidth < 768 ? 40 : 100); i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                    size: Math.random() * 2 + 1
                });
            }

            let animId;
            function draw() {
                ctx.fillStyle = bgTrail;
                ctx.fillRect(0, 0, w, h);

                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgb(${lColorRGB})`;
                    ctx.fill();

                    for(let j=i+1; j<particles.length; j++) {
                        const p2 = particles[j];
                        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if(dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(${lColorRGB}, ${1 - dist/150})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                });
                
                if(Math.random() < 0.02) {
                    const statuses = ["Loading Assets...", "Compiling Geometry...", "Syncing Database...", "Preparing Interface...", "Almost Ready..."];
                    const statusEl = document.getElementById('loader-status');
                    if(statusEl) statusEl.innerText = statuses[Math.floor(Math.random() * statuses.length)];
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
            window._loaderAnimId = animId;
        })();
    </script>

        function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9); }
        
        function parseDriveLink(url) {
            if (!url) return null;
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            if (!match || !match[1]) return { type: 'unknown', original: url };
            return {
                id: match[1],
                imageViewUrl: `https://drive.google.com/thumbnail?id=${match[1]}&sz=w2000`,
                iframePreviewUrl: `https://drive.google.com/file/d/${match[1]}/preview`
            };
        }

        function getTileById(id) {
            for (let sec of appData.sections) {
                for (let sub of sec.subsections) {
                    for (let tile of sub.tiles) {
                        if (tile.id === id) return tile;
                    }
                }
            }
            return null;
        }

        function getEffectiveHeading(tile) {
            if (tile.heading && tile.heading.trim() !== '') return tile.heading;
            
            // Fallback to subtitle to support older saved data gracefully
            const role = (tile.role || tile.subtitle || '').trim();
            const base = (tile.baseSubject || '').trim();
            const spec = (tile.specialisation || '').trim();
            const emp = (tile.employer || '').trim();
            
            let combinedRole = '';
            if (role && base) combinedRole = `${role}, ${base}`;
            else if (role) combinedRole = role;
            else if (base) combinedRole = base;

            if (combinedRole && spec) combinedRole += ` (${spec})`;
            else if (spec) combinedRole = spec;

            if (combinedRole && emp) return `${combinedRole} @ ${emp}`;
            if (combinedRole) return combinedRole;
            if (emp) return emp;
            return 'Untitled Tile';
        }

            if (!text) return '';
            return text.split(/\n+/).filter(p => p.trim() !== '').map((p, i) => `<p class="${i > 0 ? marginClass : ''}">${p}</p>`).join('');

        function parseDateForSort(dateStr) {
            if (!dateStr) return 0;

        function encodeTileToPath(tileId) {
            if (tileId === 'chatbot') return 'chatbot';
            if (tileId.startsWith('newtab_')) return tileId;
            for(let s=0; s<appData.sections.length; s++) {
                for(let ss=0; ss<appData.sections[s].subsections.length; ss++) {
                    for(let t=0; t<appData.sections[s].subsections[ss].tiles.length; t++) {
                        if(appData.sections[s].subsections[ss].tiles[t].id === tileId) return `${s+1}-${ss+1}-${t+1}`;
                    }
                }
            }
            return 'chatbot';
        }

        function decodePathToTile(path) {
            if (path === 'chatbot') return 'chatbot';
            if (path.startsWith('newtab_')) return path;
            const parts = path.split('-');
            if(parts.length === 3) {
                const s = parseInt(parts[0])-1; const ss = parseInt(parts[1])-1; const t = parseInt(parts[2])-1;
                try { return appData.sections[s].subsections[ss].tiles[t].id; } catch(e){}
            }
            return 'chatbot';
        }

        function syncStateToURL() {
            if(window.location.hash === '#admin') return;
            try {
                const url = new URL(window.location);
                url.searchParams.set('tile', encodeTileToPath(activeAsideTab));
                url.searchParams.set('tab', openTabs.map(t => encodeTileToPath(t)).join('_'));
                url.searchParams.set('aps', aps);
                url.searchParams.set('view', viewMode);
                url.searchParams.set('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                window.history.replaceState({}, '', url);
            } catch (e) {
                console.warn("URL state syncing is disabled in this preview environment.");
            }
        }

        function loadStateFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            const tabParam = params.get('tab');
            if(tabParam) {
                const paths = tabParam.split('_');
                openTabs = paths.map(p => decodePathToTile(p)).filter(id => id === 'chatbot' || id.startsWith('newtab_') || getTileById(id));
                if(openTabs.length === 0) openTabs = ['chatbot'];
            }
            
            const tileParam = params.get('tile');
            if(tileParam) {
                const decoded = decodePathToTile(tileParam);
                if (openTabs.includes(decoded)) activeAsideTab = decoded;
                else activeAsideTab = openTabs[0];
            }
            
            const apsParam = params.get('aps');
            if(apsParam && ['dock', 'min', 'max', 'closed'].includes(apsParam)) aps = apsParam;

            const viewParam = params.get('view');
            if(viewParam && ['default', 'timeline'].includes(viewParam)) viewMode = viewParam;

            const themeParam = params.get('theme');
            const storedTheme = JSON.parse(localStorage.getItem('themePref'));
            const now = new Date().getTime();
            
            if (themeParam === 'dark' || themeParam === 'light') {
                setTheme(themeParam === 'dark');
            } else if (storedTheme && (now - storedTheme.time < 24 * 60 * 60 * 1000)) {
                setTheme(storedTheme.mode === 'dark');
            } else {
                setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
            }
        }

        function setTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('themePref', JSON.stringify({ mode: isDark ? 'dark' : 'light', time: new Date().getTime() }));
        }

                return appData;
            } catch (e) { return appData; }

            if(btn) { btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save'; btn.disabled = false; }

        }

                            <div id="custom-nav-menu" class="absolute top-[calc(100%+0.75rem)] left-0 w-72 bg-white dark:bg-darkCard rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden z-50 flex-col max-h-[70vh] overflow-y-auto text-left transform opacity-0 scale-95 transition-all duration-200 origin-top-left invisible">

                        <div id="aside-body-wrapper" class="flex-col flex-1 overflow-hidden ${aps === 'min' ? 'hidden' : 'flex'} text-left">

                        <div id="aside-min-view" class="${aps === 'min' ? 'flex' : 'hidden'} flex-1 items-center justify-between px-4 bg-white dark:bg-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 text-left" onclick="setAsideState('dock')">

        }

        function renderLeftContent() {
            let heroBg = ""; let heroOverlay = "";
            const hDriveData = parseDriveLink(appData.hero.bgImageLink);
            if (hDriveData && hDriveData.id) {
                heroBg = `background-image: url('${hDriveData.imageViewUrl}'); background-size: cover; background-position: center; background-attachment: fixed;`;
                heroOverlay = `<div class="absolute inset-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm z-0"></div>`;
            }

            let profileImgHtml = `<div class="w-32 h-32 md:w-40 md:h-40 bg-slate-200 dark:bg-slate-700 border-4 border-white dark:border-slate-800 shadow-xl flex items-center justify-center text-4xl text-slate-400" style="clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);"><i class="fa-solid fa-user"></i></div>`;
            const pDriveData = parseDriveLink(appData.hero.profileImageLink);
            if (pDriveData && pDriveData.id) {
                profileImgHtml = `<img src="${pDriveData.imageViewUrl}" alt="${appData.hero.name}" class="w-32 h-32 md:w-40 md:h-40 object-cover border-4 border-white dark:border-slate-800 shadow-xl relative z-10" style="border-radius: ${profileBlobShape}; transition: border-radius 0.5s ease;">`;
            }

            const heroHTML = `
                <section id="top" class="relative min-h-[60vh] flex flex-col justify-center py-20 px-6 border-b border-slate-200 dark:border-slate-800 text-left scroll-target" data-name="Overview">
                    <div class="absolute inset-0 z-0" style="${heroBg}"></div>
                    ${heroOverlay}
                    <div class="relative z-10 max-w-4xl mx-auto w-full flex flex-col items-start text-left">
                        <div class="mb-8 text-left">${profileImgHtml}</div>
                        <h1 class="text-5xl md:text-7xl font-bold text-primary dark:text-white tracking-tight mb-4 text-left w-full">${appData.hero.name}</h1>
                        <div class="text-2xl md:text-3xl text-secondary font-semibold mb-8 text-left w-full">
                            <div id="hero-title-container" class="grid w-full text-left relative">
                                <!-- Titles generated dynamically by JS grid technique -->
                            </div>
                        </div>
                        <div class="text-lg text-slate-600 dark:text-slate-300 leading-relaxed max-w-2xl text-left">${formatText(appData.hero.bio, 'mt-4')}</div>
                    </div>
                </section>
            `;

            const footerHTML = `
                <footer class="py-10 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-left px-6 md:px-12 mt-12">
                    <div class="max-w-4xl mx-auto text-left">
                        <div class="flex gap-6 mb-4 justify-start text-left">
                            <a href="mailto:${appData.uiText.contactEmail}" class="text-slate-400 hover:text-secondary text-xl"><i class="fa-solid fa-envelope"></i></a>
                            <a href="${appData.uiText.linkedinLink}" target="_blank" class="text-slate-400 hover:text-secondary text-xl"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="${appData.uiText.githubLink}" target="_blank" class="text-slate-400 hover:text-secondary text-xl"><i class="fa-brands fa-github"></i></a>
                        </div>
                        <p class="text-sm text-slate-500 dark:text-slate-400 text-left">&copy; ${new Date().getFullYear()} ${appData.uiText.siteTitle}. All rights reserved.</p>
                    </div>
                </footer>
            `;

            return heroHTML + `<div id="left-content-dynamic" class="text-left w-full"></div>` + footerHTML;
        }

        function renderCategorizedView() {
            return appData.sections.map(sec => {
                let secBg = ""; let secOverlay = "";
                const sDriveData = parseDriveLink(sec.bgImage);
                if (sDriveData && sDriveData.id) {
                    secBg = `background-image: url('${sDriveData.imageViewUrl}'); background-size: cover; background-position: center; background-attachment: fixed;`;
                    secOverlay = `<div class="absolute inset-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm z-0"></div>`;
                }

                return `
                    <section id="nav-sec-${sec.id}" class="relative py-20 px-6 md:px-12 border-b border-slate-200 dark:border-slate-800 text-left scroll-target nav-sec-container" data-name="${sec.name.replace(/"/g, '&quot;')}" style="${secBg}">
                        ${secOverlay}
                        <div class="relative z-10 max-w-4xl mx-auto w-full text-left">
                            <h2 class="text-3xl font-bold text-primary dark:text-white mb-12 flex items-center gap-4 text-left"><div class="w-8 h-1 bg-secondary rounded"></div> ${sec.name}</h2>
                            <div class="space-y-12 text-left w-full">
                                ${sec.subsections.map(sub => `
                                    <div id="nav-sub-${sub.id}" class="text-left w-full scroll-target nav-sub-container" data-sec-id="nav-sec-${sec.id}" data-name="${sub.name.replace(/"/g, '&quot;')}">
                                        <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-300 mb-6 uppercase tracking-wider text-sm text-left">${sub.name}</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full text-left">
                                            ${sub.tiles.map(tile => generateTileCardHTML(tile)).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }).join('');
        }

        function renderTimelineView() {
            let allTiles = [];
            appData.sections.forEach(s => s.subsections.forEach(ss => ss.tiles.forEach(t => {
                allTiles.push({...t, secName: s.name, subName: ss.name, sortDate: parseDateForSort(t.date)});
            })));

            const datedTiles = allTiles.filter(t => t.date && t.date.trim() !== '').sort((a, b) => b.sortDate - a.sortDate);
            const undatedTiles = allTiles.filter(t => !t.date || t.date.trim() === '');

            let html = `
                <section class="py-20 px-6 md:px-12 text-left bg-slate-50 dark:bg-darkBg relative scroll-target">
                    <div class="max-w-4xl mx-auto w-full relative text-left">
                        <h2 class="text-3xl font-bold text-primary dark:text-white mb-12 flex items-center gap-4 text-left"><div class="w-8 h-1 bg-secondary rounded"></div> Timeline View</h2>
                        <div class="border-l-2 border-slate-200 dark:border-slate-700 ml-4 md:ml-6 pl-8 md:pl-12 space-y-12 relative text-left">
            `;

            datedTiles.forEach(tile => {
                html += `
                    <div class="relative text-left">
                        <div class="absolute -left-[41px] md:-left-[57px] top-6 w-5 h-5 rounded-full bg-secondary border-4 border-slate-50 dark:border-slate-900"></div>
                        <div class="text-sm text-slate-500 dark:text-slate-400 mb-3 text-left">
                            <span class="font-bold text-secondary">${tile.date}</span> ${tile.location ? ` | ${tile.location}` : ''}
                            <div class="text-xs uppercase tracking-wider mt-1 text-left">${tile.secName} > ${tile.subName}</div>
                        </div>
                        <div class="w-full md:w-3/4 text-left">
                            ${generateTileCardHTML(tile)}
                        </div>
                    </div>
                `;
            });

            html += `</div></div></section>`;

            if (undatedTiles.length > 0) {
                html += `
                    <section class="py-16 px-6 md:px-12 text-left bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
                        <div class="max-w-4xl mx-auto w-full text-left">
                            <h3 class="text-2xl font-bold text-slate-700 dark:text-slate-300 mb-8 flex items-center gap-4 text-left"><i class="fa-solid fa-list-ul text-slate-400"></i> Undated Elements</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full text-left">
                                ${undatedTiles.map(t => generateTileCardHTML(t)).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            return html;
        }

        function generateTileCardHTML(tile) {
            let tBg = "";
            const tDriveData = parseDriveLink(tile.bgImage);
            if (tDriveData && tDriveData.id) {
                tBg = `background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('${tDriveData.imageViewUrl}'); background-size: cover; color: white;`;
            }
            const isDarkBg = !!tDriveData && !!tDriveData.id;
            const textClass = isDarkBg ? "text-slate-200" : "text-slate-600 dark:text-slate-400";
            const titleClass = isDarkBg ? "text-white" : "text-primary dark:text-white";

            const effectiveHeading = getEffectiveHeading(tile);
            const isAutoHeading = !(tile.heading && tile.heading.trim() !== '');

            let cardMetaItems = [];
            if (!isAutoHeading) {
                const role = tile.role || tile.subtitle;
                if (role) cardMetaItems.push(role);
                if (tile.baseSubject) cardMetaItems.push(tile.baseSubject);
                if (tile.specialisation) cardMetaItems.push(tile.specialisation);
                if (tile.employer) cardMetaItems.push(tile.employer);
            }
            
            if (tile.score && tile.score.trim() !== '') {
                let scoreStr = `Score: ${tile.score}`;
                if (tile.maxScore && tile.maxScore.trim() !== '') scoreStr += ` / ${tile.maxScore}`;
                cardMetaItems.push(scoreStr);
            }
            
            if (tile.date) cardMetaItems.push(tile.date);
            if (tile.location) cardMetaItems.push(tile.location);
            
            const metaInfo = cardMetaItems.join(' | ');
            const metaHTML = metaInfo ? `<p class="text-xs font-semibold mb-3 ${isDarkBg ? 'text-blue-300' : 'text-secondary'} text-left">${metaInfo}</p>` : '';

            return `
                <div id="dom-tile-${tile.id}" onclick="tileClicked('${tile.id}')" class="portfolio-tile group cursor-pointer rounded-xl p-6 border shadow-sm transition-all bg-white dark:bg-darkCard relative overflow-hidden text-left" style="${tBg}">
                    <div class="tile-active-indicator absolute top-0 right-0 w-12 h-12 bg-secondary rounded-bl-full flex items-start justify-end p-2 text-white hidden"><i class="fa-solid fa-check text-xs"></i></div>
                    <div class="text-secondary mb-4 text-3xl text-left"><i class="fa-solid ${tile.icon || 'fa-cube'}"></i></div>
                    <h4 class="text-xl font-bold mb-1 text-left ${titleClass}">${effectiveHeading}</h4>
                    ${metaHTML}
                    <div class="text-sm line-clamp-3 text-left ${textClass}">${formatText(tile.description, 'mt-3')}</div>
                </div>
            `;
        }

        function updateAsideUI() {
            const aside = document.getElementById('right-aside');
            if(!aside) return;

            aside.className = `border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-xl md:shadow-none text-left aps-${aps}`;
            if (isAsideOpenMobile) aside.classList.add('open');

            document.getElementById('aside-body-wrapper').className = `flex-col flex-1 overflow-hidden ${aps === 'min' ? 'hidden' : 'flex'} text-left`;
            document.getElementById('aside-min-view').className = `${aps === 'min' ? 'flex' : 'hidden'} flex-1 items-center justify-between px-4 bg-white dark:bg-slate-800 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700 text-left`;

            const tabsContainer = document.getElementById('aside-tabs');
            tabsContainer.innerHTML = openTabs.map(tabId => {
                const isActive = tabId === activeAsideTab;
                const activeClasses = isActive 
                    ? "bg-white dark:bg-slate-800 border-t-2 border-secondary font-bold text-secondary dark:text-white pb-3 pt-2 shadow-[0_4px_0_0_#fff] dark:shadow-[0_4px_0_0_#1e293b] z-10" 
                    : "bg-slate-50 hover:bg-slate-200 dark:bg-slate-800/50 dark:hover:bg-slate-700 border-t-2 border-transparent text-slate-500 pb-2 pt-2";
                
                if (tabId === 'chatbot') {
                    if (isActive) document.getElementById('min-title-text').innerText = `Chat with ${appData.uiText.botName.split(' ')[0]}`;
                    return `<div id="tab-btn-chatbot" onclick="openTab('chatbot')" class="px-4 rounded-t-lg cursor-pointer flex items-center gap-2 whitespace-nowrap transition-colors flex-shrink-0 text-left ${activeClasses}">
                                <i class="fa-solid fa-robot"></i> <span class="text-sm">Chat with ${appData.uiText.botName.split(' ')[0]}</span>
                            </div>`;
                } else if (tabId.startsWith('newtab_')) {
                    if (isActive) document.getElementById('min-title-text').innerText = `New Tab`;
                    return `<div id="tab-btn-${tabId}" onclick="openTab('${tabId}')" class="px-4 rounded-t-lg cursor-pointer flex items-center gap-2 whitespace-nowrap transition-colors group flex-shrink-0 text-left ${activeClasses}">
                                <i class="fa-solid fa-layer-group text-xs"></i> <span class="text-sm">Explore</span>
                                <button onclick="closeTab(event, '${tabId}')" class="ml-1 w-5 h-5 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xs"></i></button>
                            </div>`;
                } else {
                    const tile = getTileById(tabId);
                    if (!tile) return '';
                    const effectiveHeading = getEffectiveHeading(tile);
                    if (isActive) document.getElementById('min-title-text').innerText = effectiveHeading;
                    return `<div id="tab-btn-${tile.id}" onclick="openTab('${tile.id}')" class="px-4 rounded-t-lg cursor-pointer flex items-center gap-2 whitespace-nowrap transition-colors group flex-shrink-0 text-left ${activeClasses}">
                                <i class="fa-solid ${tile.icon} text-xs"></i> <span class="text-sm truncate max-w-[120px]">${effectiveHeading}</span>
                                <button onclick="closeTab(event, '${tile.id}')" class="ml-1 w-5 h-5 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xs"></i></button>
                            </div>`;
                }
            }).join('');

            const contentContainer = document.getElementById('aside-content');
            if (activeAsideTab === 'chatbot') contentContainer.innerHTML = renderChatbotHTML();
            else if (activeAsideTab.startsWith('newtab_')) contentContainer.innerHTML = renderNewTabHTML();
            else contentContainer.innerHTML = renderTileDetailsHTML(activeAsideTab);
        }

        function updateTileHighlights() {
            document.querySelectorAll('.portfolio-tile').forEach(el => {
                const isActive = el.id === `dom-tile-${activeAsideTab}`;
                if (isActive) {
                    el.classList.add('ring-2', 'ring-secondary', 'scale-[1.02]');
                    el.classList.remove('border-slate-200', 'dark:border-slate-700', 'hover:-translate-y-1');
                    el.querySelector('.tile-active-indicator')?.classList.remove('hidden');
                } else {
                    el.classList.remove('ring-2', 'ring-secondary', 'scale-[1.02]');
                    el.classList.add('border-slate-200', 'dark:border-slate-700', 'hover:-translate-y-1');
                    el.querySelector('.tile-active-indicator')?.classList.add('hidden');
                }
            });
        }

        // ==========================================
        // 5. ASIDE CONTENT HTML GENERATORS
        // ==========================================
        function renderChatbotHTML() {
            const msgs = chatHistory.map(msg => `
                <div class="mb-4 flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} chat-bubble w-full">
                    <div class="max-w-[85%] rounded-2xl px-4 py-3 text-sm text-left ${msg.sender === 'user' ? 'bg-secondary text-white rounded-br-none' : 'bg-white dark:bg-darkCard text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-bl-none shadow-sm'}">
                        ${msg.text}
                    </div>
                </div>
            `).join('');

            return `
                <div class="flex flex-col h-full absolute inset-0 text-left">
                    <div class="flex-1 p-4 overflow-y-auto" id="chat-window">${msgs}</div>
                    <div class="p-4 bg-white dark:bg-darkCard border-t border-slate-200 dark:border-slate-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] w-full">

        function renderTileDetailsHTML(tileId) {
            const tile = getTileById(tileId);
            if (!tile) return `<div class="p-6 text-slate-500 text-left">Item not found.</div>`;

            let mediaHtml = (tile.mediaLinks || []).map(link => {
                if (!link || !link.trim()) return '';
                const trimmed = link.trim();
                
                if (trimmed.toLowerCase().startsWith('<iframe')) {
                    let fixedIframe = trimmed;
                    if(!fixedIframe.includes('w-full')) fixedIframe = fixedIframe.replace('<iframe', '<iframe class="w-full h-full border-none"');
                    return `<div class="w-full aspect-video mb-4 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm bg-slate-100 dark:bg-slate-900 text-left">${fixedIframe}</div>`;
                }

                if (trimmed.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i)) {
                    return `<div class="w-full mb-4 rounded-lg overflow-hidden shadow-sm bg-slate-100 dark:bg-slate-900 text-left"><img src="${trimmed}" class="w-full h-auto"></div>`;
                }

                const driveData = parseDriveLink(trimmed);
                if (driveData && driveData.id) {
                    return `<div class="w-full aspect-video mb-4 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm bg-slate-100 dark:bg-slate-900 text-left">
                                <iframe src="${driveData.iframePreviewUrl}" class="w-full h-full border-none" allow="autoplay"></iframe>
                            </div>`;
                }

                if (trimmed.startsWith('http')) {
                    return `<div class="w-full aspect-video mb-4 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm bg-slate-100 dark:bg-slate-900 text-left">
                                <iframe src="${trimmed}" class="w-full h-full border-none" allow="autoplay"></iframe>
                            </div>`;
                }
                return '';
            }).join('');

            let relatedHtml = '';
            if (tile.relatedTiles && tile.relatedTiles.length > 0) {
                const relatedLinks = tile.relatedTiles.map(relId => {
                    const relTile = getTileById(relId);
                    if (!relTile) return '';
                    return `<button onclick="openTab('${relTile.id}')" class="text-left w-full p-3 bg-white dark:bg-darkCard border border-slate-200 dark:border-slate-700 rounded-lg hover:border-secondary dark:hover:border-secondary mb-2 transition-colors flex items-center gap-3 shadow-sm hover:shadow">
                                <div class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center flex-shrink-0"><i class="fa-solid ${relTile.icon} text-secondary text-xs"></i></div>
                                <span class="font-medium text-sm text-slate-700 dark:text-slate-300 truncate text-left w-full">${getEffectiveHeading(relTile)}</span>
                            </button>`;
                }).join('');
                
                relatedHtml = `
                    <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700 text-left w-full">
                        <h5 class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-4 text-left"><i class="fa-solid fa-link mr-2"></i> ${appData.uiText.relatedTabsBtn}</h5>
                        ${relatedLinks}
                    </div>
                `;
            }

            let metaItems = [];
            const role = tile.role || tile.subtitle;
            if (role) metaItems.push(`<span>${role}</span>`);
            if (tile.baseSubject) metaItems.push(`<span>${tile.baseSubject}</span>`);
            if (tile.specialisation) metaItems.push(`<span>${tile.specialisation}</span>`);
            if (tile.employer) {
                if (tile.employerUrl) metaItems.push(`<a href="${tile.employerUrl}" target="_blank" class="text-secondary hover:underline inline-flex items-center gap-1">${tile.employer} <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i></a>`);
                else metaItems.push(`<span>${tile.employer}</span>`);
            }
            
            if (tile.score && tile.score.trim() !== '') {
                let scoreStr = `Score: ${tile.score}`;
                if (tile.maxScore && tile.maxScore.trim() !== '') scoreStr += ` / ${tile.maxScore}`;
                metaItems.push(`<span class="font-bold text-secondary dark:text-blue-400">${scoreStr}</span>`);
            }
            
            if (tile.date) metaItems.push(`<span>${tile.date}</span>`);
            if (tile.location) metaItems.push(`<span>${tile.location}</span>`);
            
            const metaHTML = metaItems.length > 0 ? `<div class="text-sm font-semibold mb-6 text-slate-500 dark:text-slate-400 text-left flex flex-wrap gap-x-3 gap-y-1 items-center">` + metaItems.join('<span class="text-slate-300 dark:text-slate-600">|</span>') + `</div>` : '';

            return `
                <div class="p-6 absolute inset-0 overflow-y-auto text-left">
                    <div class="w-14 h-14 bg-blue-100 dark:bg-blue-900/30 text-secondary rounded-2xl flex items-center justify-center text-2xl mb-6 shadow-sm">
                        <i class="fa-solid ${tile.icon}"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-primary dark:text-white mb-2 text-left">${getEffectiveHeading(tile)}</h2>
                    ${metaHTML}
                    <div class="text-slate-600 dark:text-slate-300 text-sm leading-relaxed mb-8 text-left">${formatText(tile.tabText || tile.description, 'mt-4')}</div>
                    
                    ${mediaHtml}
                    ${relatedHtml}
                    <div class="h-8"></div>
                </div>
            `;
        }

        function generateBotResponse(query) {
            const lowerQuery = query.toLowerCase();

            // 1. Hardcoded / Greeting checks
            if (lowerQuery.match(/^(hi|hello|hey|greetings|start)/)) {
                return `Hello! I'm ${appData.uiText.botName.split(' ')[0]}. You can ask me about specific skills, my work experience, or how to contact me.`;
            }
            if (lowerQuery.includes('contact') || lowerQuery.includes('email') || lowerQuery.includes('phone') || lowerQuery.includes('hire')) {
                return `You can reach me via email at <a href="mailto:${appData.uiText.contactEmail}" class="text-secondary hover:underline">${appData.uiText.contactEmail}</a> or call ${appData.uiText.contactPhone}. Let's connect!`;
            }

            // 2. Keyword extraction (remove stop words)
            const stopWords = ['a', 'an', 'the', 'is', 'at', 'in', 'of', 'for', 'to', 'and', 'or', 'with', 'about', 'my', 'your', 'i', 'me', 'tell', 'what', 'where', 'how', 'do', 'you', 'have', 'know', 'can', 'show', 'any'];
            const keywords = lowerQuery.replace(/[^\w\s]/g, '').split(/\s+/).filter(w => !stopWords.includes(w) && w.length > 1);

            if (keywords.length === 0) {
                return "Could you be a bit more specific? I can tell you about my education, experience, or specific skills!";
            }

            // 3. Scoring tiles based on data structure
            let scoredTiles = [];
            appData.sections.forEach(sec => {
                sec.subsections.forEach(sub => {
                    sub.tiles.forEach(tile => {
                        let score = 0;
                        const searchableText = {
                            high: [tile.heading, tile.role, tile.baseSubject, tile.specialisation, tile.employer].filter(Boolean).join(' ').toLowerCase(),
                            medium: (tile.description || '').toLowerCase(),
                            low: (tile.tabText || '').toLowerCase()
                        };

                        keywords.forEach(kw => {
                            if (searchableText.high.includes(kw)) score += 5;
                            if (searchableText.medium.includes(kw)) score += 3;
                            if (searchableText.low.includes(kw)) score += 1;
                        });

                        if (score > 0) {
                            scoredTiles.push({ tile, score });
                        }
                    });
                });
            });

            // 4. Formatting output
            if (scoredTiles.length > 0) {
                scoredTiles.sort((a, b) => b.score - a.score);
                const topMatch = scoredTiles[0].tile;
                let response = `I found some relevant information. Check out <strong>${getEffectiveHeading(topMatch)}</strong>.`;
                
                if (topMatch.description) {
                    response += `<br><br><span class="italic text-slate-500 dark:text-slate-400">"${topMatch.description.substring(0, 120)}..."</span>`;
                }

                response += `<div class="mt-3 flex flex-col gap-2 w-full text-left">`;
                const maxButtons = Math.min(scoredTiles.length, 3);
                for(let i=0; i<maxButtons; i++){
                    response += `<button onclick="openTab('${scoredTiles[i].tile.id}')" class="text-xs bg-blue-50 dark:bg-blue-900/30 text-secondary border border-blue-200 dark:border-blue-800 px-3 py-2 rounded hover:bg-blue-100 dark:hover:bg-blue-800 transition-colors text-left flex items-center justify-between shadow-sm"><span class="truncate pr-2 font-medium">${getEffectiveHeading(scoredTiles[i].tile)}</span> <i class="fa-solid fa-arrow-right"></i></button>`;
                }
                response += `</div>`;
                return response;
            }

            // 5. Fallback
            return `I couldn't find specific details about that in the portfolio data. Feel free to browse the categories or <a href="mailto:${appData.uiText.contactEmail}" class="text-secondary hover:underline">contact me directly</a>!`;
        }

        function sendQuickMessage(text, isCustom = false) {
            chatHistory.push({ sender: 'user', text: text });
            updateAsideUI();
            setTimeout(() => { const cw = document.getElementById('chat-window'); if (cw) cw.scrollTop = cw.scrollHeight; }, 50);
            
            // Show typing indicator
            const typingId = 'typing_' + Date.now();
            chatHistory.push({ sender: 'bot', text: '<i class="fa-solid fa-ellipsis fa-fade text-slate-400 text-lg"></i>', id: typingId });
            updateAsideUI();
            setTimeout(() => { const cw = document.getElementById('chat-window'); if (cw) cw.scrollTop = cw.scrollHeight; }, 50);

            setTimeout(() => {
                // Remove typing indicator
                chatHistory = chatHistory.filter(msg => msg.id !== typingId);
                
                // Generate dynamic response
                const response = generateBotResponse(text);

                chatHistory.push({ sender: 'bot', text: response });
                updateAsideUI();
                setTimeout(() => { const cw = document.getElementById('chat-window'); if (cw) cw.scrollTop = cw.scrollHeight; }, 50);
            }, 600 + Math.random() * 500); // Slight random delay for realism
        }

                container.innerHTML = `<span class="text-slate-500 font-semibold cursor-default text-left">Timeline View</span>`;

                container.innerHTML = `<span onclick="scrollToNavTarget('top')" class="hover:text-secondary cursor-pointer transition-colors text-left font-semibold">Overview</span>`;
                return;
            }

            let html = `<span onclick="scrollToNavTarget('${secObj.id}')" class="hover:text-secondary cursor-pointer transition-colors text-left font-semibold truncate max-w-[120px]" title="${secObj.name}">${secObj.name}</span>`;

        function setupScrollSpy() {
            const container = document.getElementById('left-content');
            if(!container) return;

            container.addEventListener('scroll', () => {
                if (viewMode === 'timeline') {
                    updateBreadcrumbs(null, null);
                    return;
                }
                
                const targets = Array.from(document.querySelectorAll('.scroll-target'));
                let foundSec = null;
                let foundSub = null;

                for (let i = targets.length - 1; i >= 0; i--) {
                    const target = targets[i];
                    const rect = target.getBoundingClientRect();
                    
                    if (rect.top <= window.innerHeight / 2) {
                        if (target.id === 'top') {
                            foundSec = {id: 'top', name: 'Overview'};
                        } else if (target.classList.contains('nav-sec-container')) {
                            foundSec = {id: target.id, name: target.dataset.name};
                        } else if (target.classList.contains('nav-sub-container')) {
                            foundSub = {id: target.id, name: target.dataset.name};
                            const parentSec = document.getElementById(target.dataset.secId);
                            if (parentSec) foundSec = {id: parentSec.id, name: parentSec.dataset.name};
                        }
                        break;
                    }
                }
                
                if (!foundSec) foundSec = {id: 'top', name: 'Overview'};

                if (activeScrollSec?.id !== foundSec?.id || activeScrollSub?.id !== foundSub?.id) {
                    activeScrollSec = foundSec;
                    activeScrollSub = foundSub;
                    updateBreadcrumbs(activeScrollSec, activeScrollSub);
                }
            });
            
            setTimeout(() => container.dispatchEvent(new Event('scroll')), 100);
        }

        function setupAnimatedTitles() {
            if (titleInterval) clearInterval(titleInterval);
            const container = document.getElementById('hero-title-container');
            if (!container) return;

            const titlesArray = appData.hero.animatedTitles.split(',').map(t => t.trim()).filter(t => t);
            if (titlesArray.length === 0) return;

            container.className = "grid w-full text-left relative";
            container.innerHTML = titlesArray.map((t, i) => `
                <div class="hero-phrase col-start-1 row-start-1 w-full text-left transition-all duration-700 ease-in-out ${i === 0 ? 'opacity-100 translate-y-0 z-10' : 'opacity-0 translate-y-6 z-0 pointer-events-none'}">${t}</div>
            `).join('');

            if (titlesArray.length <= 1) return;

            let currentIndex = 0;
            const phrases = container.querySelectorAll('.hero-phrase');

            titleInterval = setInterval(() => {
                const currentEl = phrases[currentIndex];
                const nextIndex = (currentIndex + 1) % phrases.length;
                const nextEl = phrases[nextIndex];

                currentEl.classList.remove('opacity-100', 'translate-y-0', 'z-10');
                currentEl.classList.add('opacity-0', '-translate-y-6', 'z-0', 'pointer-events-none');

                nextEl.classList.remove('opacity-0', 'translate-y-6', '-translate-y-6', 'z-0', 'pointer-events-none');
                nextEl.classList.add('opacity-100', 'translate-y-0', 'z-10');

                setTimeout(() => {
                    currentEl.classList.remove('-translate-y-6');
                    currentEl.classList.add('translate-y-6');
                }, 700);

                currentIndex = nextIndex;
            }, 3500); 
        }

        function toggleAdminExpand(id) { adminExpanded[id] = !adminExpanded[id]; adminRenderWithScroll(); }

        function renderAdminDashboard() {
            let breadcrumbs = `<button onclick="adminNavigate([])" class="hover:text-secondary font-medium">Root (Global)</button>`;
            let editorHtml = '';

            if (adminPath.length === 3) {
                // Editing a specific Tile
                const sec = appData.sections.find(s => s.id === adminPath[0]);
                const sub = sec?.subsections.find(s => s.id === adminPath[1]);
                const tile = sub?.tiles.find(t => t.id === adminPath[2]);

                if (tile) {
                    breadcrumbs += ` <i class="fa-solid fa-chevron-right text-xs mx-2 text-slate-400"></i> <span class="text-slate-400">${sec.name}</span>`;
                    breadcrumbs += ` <i class="fa-solid fa-chevron-right text-xs mx-2 text-slate-400"></i> <span class="text-slate-400">${sub.name}</span>`;
                    breadcrumbs += ` <i class="fa-solid fa-chevron-right text-xs mx-2 text-slate-400"></i> <span class="text-slate-400">${getEffectiveHeading(tile)}</span>`;
                    editorHtml = renderAdminTile(tile);
                } else {
                    editorHtml = renderAdminRoot();
                    adminPath = []; // fallback if missing
                }
            } else {
                // Root view (which now includes Sections and Subsections)
                editorHtml = renderAdminRoot();
            }

            const isDark = document.documentElement.classList.contains('dark');
            const themeToggleKnobClass = isDark ? 'translate-x-6' : 'translate-x-1';
            const themeToggleBgClass = isDark ? 'bg-secondary' : 'bg-slate-300 dark:bg-slate-600';

            return `
                <div class="h-screen w-full bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 flex flex-col text-left">

                                    <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 ease-in-out ${themeToggleKnobClass} shadow-sm"></span>
                                </button>

                        </div>
                    </div>
                    <div id="admin-scroll-container" class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 overflow-y-auto pb-20 text-left relative">
                        ${editorHtml}
                    </div>
                </div>
            `;
        }

                    return `

                            </div>

            }).join('');

            return `
                <div class="space-y-8 text-left">
                    <div class="bg-white dark:bg-darkCard p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 text-left">
                        <h3 class="text-xl font-bold mb-4 border-b border-slate-100 dark:border-slate-800 pb-2 text-secondary text-left"><i class="fa-solid fa-image mr-2"></i> Landing Page (Hero)</h3>

                            <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Full Name</label><input type="text" onchange="appData.hero.name=this.value" value="${hero.name}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 font-bold text-left"></div>
                            <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Animated Sentences (Comma separated)</label><input type="text" onchange="appData.hero.animatedTitles=this.value" value="${hero.animatedTitles}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm text-left"></div>

                            <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Profile Pic (G-Drive Link)</label><input type="text" onchange="appData.hero.profileImageLink=this.value" value="${hero.profileImageLink}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm font-mono text-left"></div>
                            <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Background Image (G-Drive Link)</label><input type="text" onchange="appData.hero.bgImageLink=this.value" value="${hero.bgImageLink}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm font-mono text-left"></div>
                        </div>
                    </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left w-full">
                            <div class="text-left md:col-span-2"><label class="block text-sm mb-1 opacity-70 text-left">Branding Logo (G-Drive Link or Image URL) - Optional</label><input type="text" onchange="appData.uiText.brandLogo=this.value" value="${ui.brandLogo || ''}" placeholder="Leave empty to use Site Title text" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm font-mono text-left"></div>

                        <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Date / Timeline</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'date', this.value)" value="${tile.date || ''}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-left"></div>
                        <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Location</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'location', this.value)" value="${tile.location || ''}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-left"></div>
                        <div class="text-left"><label class="block text-sm mb-1 opacity-70 text-left">Icon (FontAwesome Class)</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'icon', this.value)" value="${tile.icon || 'fa-cube'}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 font-mono text-sm text-left"></div>
                        <div class="md:col-span-2 text-left"><label class="block text-sm mb-1 opacity-70 text-left">Card Description (Short snippet)</label><textarea rows="3" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'description', this.value)" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-left">${tile.description || ''}</textarea></div>
                        <div class="md:col-span-2 text-left"><label class="block text-sm mb-1 opacity-70 text-left">Tab Detailed Content (Extended text for side pane)</label><textarea rows="5" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'tabText', this.value)" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-left">${tile.tabText || ''}</textarea></div>
                        <div class="md:col-span-2 text-left"><label class="block text-sm mb-1 opacity-70 text-left">Tile Background Image (G-Drive or URL)</label><input type="text" onchange="adminUpdateTileProp('${adminPath[0]}', '${adminPath[1]}', '${tile.id}', 'bgImage', this.value)" value="${tile.bgImage || ''}" class="w-full p-2 rounded bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 font-mono text-sm text-left"></div>
                    </div>
                    
                    <div class="border-t border-slate-100 dark:border-slate-800 pt-4 text-left w-full">
                        <h4 class="font-bold mb-2 text-left">Media Attachments (Side Pane)</h4>
                        ${mediaHtml}
                        <button onclick="adminAddMedia('${adminPath[0]}', '${adminPath[1]}', '${tile.id}')" class="text-sm bg-slate-200 dark:bg-slate-700 px-3 py-1 rounded mt-2 text-left"><i class="fa-solid fa-plus"></i> Add Media Link</button>
                    </div>

                    <div class="border-t border-slate-100 dark:border-slate-800 pt-4 text-left w-full">
                        <h4 class="font-bold mb-2 text-left">Related Tabs</h4>
                        ${selectHtml}
                    </div>
                </div>
            `;
        }

        // Admin mutators
        function adminRenderWithScroll() {
            const scroller = document.getElementById('admin-scroll-container');
            const scrollPos = scroller ? scroller.scrollTop : 0;
            renderApp();
            const newScroller = document.getElementById('admin-scroll-container');
            if (newScroller) newScroller.scrollTop = scrollPos;
        }

        function adminUpdateSec(sId, prop, val) { appData.sections.find(s=>s.id===sId)[prop] = val; adminRenderWithScroll(); }
        function adminUpdateSub(sId, ssId, prop, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId)[prop] = val; adminRenderWithScroll(); }
        function adminUpdateTileProp(sId, ssId, tId, prop, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId)[prop] = val; adminRenderWithScroll(); }
        function adminAddSection() { appData.sections.push({id: generateId(), name: "New Section", bgImage: "", subsections: []}); adminRenderWithScroll(); }
        function adminDeleteSection(idx) { if(confirm("Delete section?")) { appData.sections.splice(idx, 1); adminRenderWithScroll(); } }
        function adminAddSub(sId) { appData.sections.find(s=>s.id===sId).subsections.push({id: generateId(), name: "New Subsection", tiles: []}); adminRenderWithScroll(); }
        function adminDeleteSub(sId, idx) { if(confirm("Delete subsection?")) { appData.sections.find(s=>s.id===sId).subsections.splice(idx, 1); adminRenderWithScroll(); } }
        function adminAddTile(sId, ssId) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.push({id: generateId(), heading: "", role: "New Role", baseSubject: "", specialisation: "", employer: "Company", employerUrl: "", score: "", maxScore: "", date: "", location: "", description: "", tabText: "", icon: "fa-cube", bgImage: "", mediaLinks: [], relatedTiles: []}); adminRenderWithScroll(); }
        function adminDeleteTile(sId, ssId, idx) { if(confirm("Delete tile?")) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.splice(idx, 1); adminRenderWithScroll(); } }
        function adminUpdateRelatedTiles(sId, ssId, tId, selectElem) { const selected = Array.from(selectElem.selectedOptions).map(opt => opt.value); appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).relatedTiles = selected; adminRenderWithScroll(); }
        function adminAddMedia(sId, ssId, tId) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks.push(""); adminRenderWithScroll(); }
        function adminUpdateMedia(sId, ssId, tId, idx, val) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks[idx] = val; adminRenderWithScroll(); }
        function adminRemoveMedia(sId, ssId, tId, idx) { appData.sections.find(s=>s.id===sId).subsections.find(ss=>ss.id===ssId).tiles.find(t=>t.id===tId).mediaLinks.splice(idx, 1); adminRenderWithScroll(); }

        function adminMoveSection(idx, dir) {
            if (idx + dir < 0 || idx + dir >= appData.sections.length) return;
            const temp = appData.sections[idx];
            appData.sections[idx] = appData.sections[idx + dir];
            appData.sections[idx + dir] = temp;
            adminRenderWithScroll();
        }

        function adminMoveSub(sId, idx, dir) {
            const sec = appData.sections.find(s => s.id === sId);
            if (idx + dir < 0 || idx + dir >= sec.subsections.length) return;
            const temp = sec.subsections[idx];
            sec.subsections[idx] = sec.subsections[idx + dir];
            sec.subsections[idx + dir] = temp;
            adminRenderWithScroll();
        }

        function adminMoveTile(sId, ssId, idx, dir) {
            const sub = appData.sections.find(s => s.id === sId).subsections.find(ss => ss.id === ssId);
            if (idx + dir < 0 || idx + dir >= sub.tiles.length) return;
            const temp = sub.tiles[idx];
            sub.tiles[idx] = sub.tiles[idx + dir];
            sub.tiles[idx + dir] = temp;
            adminRenderWithScroll();
        }

        // ==========================================
        // 8. KICKOFF
        // ==========================================
        async function initApp() {
            profileBlobShape = generateRandomBlob(); 
            appData = await fetchPortfolioData();
            loadStateFromURL();
            
            // Wait briefly to show off the generative loader, then smoothly fade out
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        if(window._loaderAnimId) cancelAnimationFrame(window._loaderAnimId);
                        loader.remove();
                    }, 700);
                }
            }, 800);
            
            renderApp();
            window.addEventListener('hashchange', renderApp);
        }

        initApp();
    </script>
</body>
</html>
