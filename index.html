    <!-- Inline Script for Generative Full-Screen Canvas Loader -->
    <script>
        (function initAdvancedLoader() {
            const canvas = document.getElementById('loader-canvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            let w, h;
            let particles = [];
            
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const bgTrail = isDark ? 'rgba(15, 23, 42, 0.25)' : 'rgba(248, 250, 252, 0.25)';
            const lColorRGB = isDark ? '59, 130, 246' : '37, 99, 235';

            for(let i=0; i < (window.innerWidth < 768 ? 40 : 100); i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                    size: Math.random() * 2 + 1
                });
            }

            let animId;
            function draw() {
                ctx.fillStyle = bgTrail;
                ctx.fillRect(0, 0, w, h);

                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > w) p.vx *= -1;
                    if(p.y < 0 || p.y > h) p.vy *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgb(${lColorRGB})`;
                    ctx.fill();

                    for(let j=i+1; j<particles.length; j++) {
                        const p2 = particles[j];
                        const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if(dist < 150) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = `rgba(${lColorRGB}, ${1 - dist/150})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                });
                
                if(Math.random() < 0.02) {
                    const statuses = ["Loading Assets...", "Compiling Geometry...", "Syncing Database...", "Preparing Interface...", "Almost Ready..."];
                    const statusEl = document.getElementById('loader-status');
                    if(statusEl) statusEl.innerText = statuses[Math.floor(Math.random() * statuses.length)];
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
            window._loaderAnimId = animId;
        })();
    </script>

        function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9); }
        
        function parseDriveLink(url) {
            if (!url) return null;
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            if (!match || !match[1]) return { type: 'unknown', original: url };
            return {
                id: match[1],
                imageViewUrl: `https://drive.google.com/thumbnail?id=${match[1]}&sz=w2000`,
                iframePreviewUrl: `https://drive.google.com/file/d/${match[1]}/preview`
            };
        }

        function getVisibleSections() {
            return appData.sections.filter(sec => {
                const vis = sec.visibility || 'visible';
                if (vis === 'hidden') return false;
                if (vis === 'archived' && !revealedArchives.includes(sec.id)) return false;
                return true;
            }).map(sec => {
                const newSec = {...sec};
                newSec.subsections = sec.subsections.filter(sub => {
                    const vis = sub.visibility || 'visible';
                    if (vis === 'hidden') return false;
                    if (vis === 'archived' && !revealedArchives.includes(sub.id)) return false;
                    return true;
                }).map(sub => {
                    const newSub = {...sub};
                    newSub.tiles = sub.tiles.filter(tile => {
                        const vis = tile.visibility || 'visible';
                        if (vis === 'hidden') return false;
                        if (vis === 'archived' && !revealedArchives.includes(tile.id)) return false;
                        return true;
                    });
                    return newSub;
                });
                return newSec;
            });
        }

        function getTileById(id) {
            for (let sec of appData.sections) {
                for (let sub of sec.subsections) {
                    for (let tile of sub.tiles) {
                        if (tile.id === id) return tile;
                    }
                }
            }
            return null;
        }

        function findTilePath(id) {
            for(let s of appData.sections) {
                if (s.id === id) return {sec: s};
                for(let ss of s.subsections) {
                    if (ss.id === id) return {sec: s, sub: ss};
                    for(let t of ss.tiles) {
                        if(t.id === id) return {sec: s, sub: ss, tile: t};
                    }
                }
            }
            return null;
        }

        function getEffectiveHeading(tile) {
            if (tile.heading && tile.heading.trim() !== '') return tile.heading;
            
            const role = (tile.role || tile.subtitle || '').trim();
            const base = (tile.baseSubject || '').trim();
            const spec = (tile.specialisation || '').trim();
            const emp = (tile.employer || '').trim();
            
            let combinedRole = '';
            if (role && base) combinedRole = `${role}, ${base}`;
            else if (role) combinedRole = role;
            else if (base) combinedRole = base;

            if (combinedRole && spec) combinedRole += ` (${spec})`;
            else if (spec) combinedRole = spec;

            if (combinedRole && emp) return `${combinedRole} @ ${emp}`;
            if (combinedRole) return combinedRole;
            if (emp) return emp;
            return 'Untitled Tile';
        }

            if (!text) return '';
            return text.split(/\n+/).filter(p => p.trim() !== '').map((p, i) => `<p class="${i > 0 ? marginClass : ''}">${p}</p>`).join('');
        }

            const r = () => Math.floor(Math.random() * 40) + 30; // 30% to 70%
            return `${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%`;
        }

        function parseDateForSort(dateStr) {
            if (!dateStr) return 0;
            const years = dateStr.match(/\d{4}/g);
            if (years) return Math.max(...years.map(Number));
            return 0;
        }

        function getBannerHTML(link) {
            if (!link || !link.trim()) return '';
            const trimmed = link.trim();
            
            if (trimmed.toLowerCase().startsWith('<iframe')) {
                let fixedIframe = trimmed;
                if(!fixedIframe.includes('w-full')) fixedIframe = fixedIframe.replace('<iframe', '<iframe class="w-full aspect-video border-none"');
                return `<div class="w-full aspect-video bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 relative z-10">${fixedIframe}</div>`;
            }

            const ytMatch = trimmed.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            if (ytMatch && ytMatch[1]) {
                return `<div class="w-full aspect-video bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 relative z-10">
                            <iframe src="https://www.youtube.com/embed/${ytMatch[1]}" class="w-full h-full border-none" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>`;
            }

            if (trimmed.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i)) {
                return `<img src="${trimmed}" class="w-full max-h-[400px] object-cover bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 relative z-10 pointer-events-none">`;
            }

            const driveData = parseDriveLink(trimmed);
            if (driveData && driveData.id) {
                return `<div class="w-full aspect-video bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 relative z-10">
                            <iframe src="${driveData.iframePreviewUrl}" class="w-full h-full border-none" allow="autoplay"></iframe>
                        </div>`;
            }

            if (trimmed.startsWith('http')) {
                return `<div class="w-full aspect-video bg-slate-100 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 relative z-10">
                            <iframe src="${trimmed}" class="w-full h-full border-none" allow="autoplay"></iframe>
                        </div>`;
            }
            
            return '';
        }

        function encodeTileToPath(tileId) {
            if (tileId === 'chatbot') return 'chatbot';
            if (tileId.startsWith('newtab_')) return tileId;
            for(let s=0; s<appData.sections.length; s++) {
                for(let ss=0; ss<appData.sections[s].subsections.length; ss++) {
                    for(let t=0; t<appData.sections[s].subsections[ss].tiles.length; t++) {
                        if(appData.sections[s].subsections[ss].tiles[t].id === tileId) return `${s+1}-${ss+1}-${t+1}`;
                    }
                }
            }
            return 'chatbot';
        }

        function decodePathToTile(path) {
            if (path === 'chatbot') return 'chatbot';
            if (path.startsWith('newtab_')) return path;
            const parts = path.split('-');
            if(parts.length === 3) {
                const s = parseInt(parts[0])-1; const ss = parseInt(parts[1])-1; const t = parseInt(parts[2])-1;
                try { return appData.sections[s].subsections[ss].tiles[t].id; } catch(e){}
            }
            return 'chatbot';
        }

        function syncStateToURL() {
            if(window.location.hash === '#admin') return;
            try {
                const url = new URL(window.location);
                url.searchParams.set('tile', encodeTileToPath(activeAsideTab));
                url.searchParams.set('tab', openTabs.map(t => encodeTileToPath(t)).join('_'));
                url.searchParams.set('aps', aps);
                url.searchParams.set('view', viewMode);
                url.searchParams.set('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                window.history.replaceState({}, '', url);
            } catch (e) {
                console.warn("URL state syncing is disabled.");
            }
        }

        function loadStateFromURL() {
            const params = new URLSearchParams(window.location.search);
            
            const tabParam = params.get('tab');
            if(tabParam) {
                const paths = tabParam.split('_');
                openTabs = paths.map(p => decodePathToTile(p)).filter(id => id === 'chatbot' || id.startsWith('newtab_') || getTileById(id));
                if(openTabs.length === 0) openTabs = ['chatbot'];
            }
            
            const tileParam = params.get('tile');
            if(tileParam) {
                const decoded = decodePathToTile(tileParam);
                if (openTabs.includes(decoded)) activeAsideTab = decoded;
                else activeAsideTab = openTabs[0];
            }
            
            const apsParam = params.get('aps');
            if(apsParam && ['dock', 'min', 'max', 'closed'].includes(apsParam)) aps = apsParam;

            const viewParam = params.get('view');
            if(viewParam && ['default', 'timeline'].includes(viewParam)) viewMode = viewParam;

            const themeParam = params.get('theme');
            const storedTheme = JSON.parse(localStorage.getItem('themePref'));
            const now = new Date().getTime();
            
            if (themeParam === 'dark' || themeParam === 'light') {
                setTheme(themeParam === 'dark');
            } else if (storedTheme && (now - storedTheme.time < 24 * 60 * 60 * 1000)) {
                setTheme(storedTheme.mode === 'dark');
            } else {
                setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
            }
        }

        function setTheme(isDark) {
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem('themePref', JSON.stringify({ mode: isDark ? 'dark' : 'light', time: new Date().getTime() }));
        }

        async function fetchPortfolioData() {
            if (!GOOGLE_SCRIPT_URL) return appData;
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                if (data && data.uiText) {
                    if (!data.seo) data.seo = appData.seo; // Fallback for old data
                    return data;
                }
                return appData;
            } catch (e) { return appData; }
        }

        async function savePortfolioData() {
            if (!GOOGLE_SCRIPT_URL) return alert("Missing Google Script URL.");
            const btn = document.getElementById('save-btn');
            if(btn) { btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...'; btn.disabled = true; }
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ passcode: passcode, portfolioData: appData })
                });
                const result = await response.json();
                if (result.success) alert("Saved to Cloud!");
                else alert("Error: " + (result.error || "Wrong passcode."));
            } catch (e) { alert("Network error."); }
            if(btn) { btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save'; btn.disabled = false; }
            renderApp();
        }

        function applySEOMetadata() {
            const seo = appData.seo || {};
            const title = seo.title || appData.uiText.siteTitle;
            const desc = seo.description || appData.hero.bio;
            const imgLink = parseDriveLink(seo.image || appData.hero.bgImageLink);
            const imgUrl = imgLink ? imgLink.imageViewUrl : seo.image;

            document.title = title;
            
            const updateMeta = (name, property, content) => {
                let tag = document.querySelector(`meta[${name ? `name="${name}"` : `property="${property}"`}]`);
                if (!tag) {
                    tag = document.createElement('meta');
                    if (name) tag.setAttribute('name', name);
                    if (property) tag.setAttribute('property', property);
                    document.head.appendChild(tag);
                }
                tag.setAttribute('content', content);
            };

            updateMeta('description', null, desc);
            updateMeta(null, 'og:title', title);
            updateMeta(null, 'og:description', desc);
            if (imgUrl) updateMeta(null, 'og:image', imgUrl);
        }

        function renderApp() {
            const container = document.getElementById('app-container');
            const hash = window.location.hash;
            
            applySEOMetadata();

            if (hash === '#admin') {
                container.innerHTML = passcode ? renderAdminDashboard() : renderAdminLogin();
                // Initialize auto-expanding textareas after render
                setTimeout(() => {
                    document.querySelectorAll('textarea.auto-expand').forEach(el => {
                        el.style.height = 'auto';
                        el.style.height = (el.scrollHeight) + 'px';
                    });
                }, 50);
            } else {
                let isFirstRender = false;
                if (!document.getElementById('main-wrapper')) {
                    container.innerHTML = renderPublicShell();
                    document.getElementById('left-content').innerHTML = renderLeftContent();
                    setupAnimatedTitles();
                    setupScrollSpy();
                    
                    const tabsContainer = document.getElementById('aside-tabs');
                    if (tabsContainer) {
                        tabsContainer.addEventListener('wheel', (e) => {
                            if (e.deltaY !== 0) {
                                e.preventDefault();
                                tabsContainer.scrollLeft += e.deltaY;
                            }
                        }, { passive: false });
                    }
                    isFirstRender = true;
                }
                
                // Cache scroll position to prevent jumping during DOM rebuilds
                const leftContentEl = document.getElementById('left-content');
                let savedScroll = 0;
                if (leftContentEl && !isFirstRender) {
                    savedScroll = leftContentEl.scrollTop;
                }
                
                document.getElementById('left-content-dynamic').innerHTML = viewMode === 'timeline' ? renderTimelineView() : renderCategorizedView();
                
                // Restore scroll position instantly
                if (leftContentEl && !isFirstRender) {
                    leftContentEl.scrollTop = savedScroll;
                }
                
                updateSettingsMenuHTML();
                updateAsideUI();
                updateTileHighlights();
                updateBreadcrumbs();
                syncStateToURL();

                if (isInitialLoad && activeAsideTab !== 'chatbot' && !activeAsideTab.startsWith('newtab_')) {
                    setTimeout(() => {
                        const activeTileEl = document.getElementById(`dom-tile-${activeAsideTab}`);
                        if (activeTileEl) activeTileEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        
                        const activeTabEl = document.getElementById(`tab-btn-${activeAsideTab}`);

        function renderTimelineView() {
            let allTiles = [];
            getVisibleSections().forEach(s => s.subsections.forEach(ss => ss.tiles.forEach(t => {
                allTiles.push({...t, secName: s.name, subName: ss.name, sortDate: parseDateForSort(t.date)});
            })));

            const datedTiles = allTiles.filter(t => t.date && t.date.trim() !== '').sort((a, b) => b.sortDate - a.sortDate);
            const undatedTiles = allTiles.filter(t => !t.date || t.date.trim() === '');

            let html = `
                <section class="py-20 px-6 md:px-12 text-left bg-slate-50 dark:bg-darkBg relative scroll-target">
                    <div class="max-w-4xl mx-auto w-full relative text-left">

                        <div class="border-l-2 border-slate-200 dark:border-slate-700 ml-4 md:ml-6 pl-8 md:pl-12 space-y-12 relative text-left">
            `;

            datedTiles.forEach(tile => {
                html += `

                        </div>
                        <div class="w-full md:w-3/4 text-left">
                            ${generateTileCardHTML(tile)}
                        </div>
                    </div>
                `;
            });

            html += `</div></div></section>`;

            if (undatedTiles.length > 0) {
                html += `
                    <section class="py-16 px-6 md:px-12 text-left bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
                        <div class="max-w-4xl mx-auto w-full text-left">
                            <h3 class="text-2xl font-bold text-slate-700 dark:text-slate-300 mb-8 flex items-center gap-4 text-left"><i class="fa-solid fa-list-ul text-slate-400"></i> Undated Elements</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full text-left">
                                ${undatedTiles.map(t => generateTileCardHTML(t)).join('')}
                            </div>
                        </div>
                    </section>
                `;
            }

            return html;
        }

        function generateTileCardHTML(tile) {
            let tBg = "";
            const tDriveData = parseDriveLink(tile.bgImage);
            if (tDriveData && tDriveData.id) {
                tBg = `background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('${tDriveData.imageViewUrl}'); background-size: cover; color: white;`;
            }
            const isDarkBg = !!tDriveData && !!tDriveData.id;
            const textClass = isDarkBg ? "text-slate-200" : "text-slate-600 dark:text-slate-400";
            const titleClass = isDarkBg ? "text-white" : "text-primary dark:text-white";

            const effectiveHeading = getEffectiveHeading(tile);
            const isAutoHeading = !(tile.heading && tile.heading.trim() !== '');

            let cardMetaItems = [];
            if (!isAutoHeading) {
                const role = tile.role || tile.subtitle;
                if (role) cardMetaItems.push(role);
                if (tile.baseSubject) cardMetaItems.push(tile.baseSubject);
                if (tile.specialisation) cardMetaItems.push(tile.specialisation);
                if (tile.employer) cardMetaItems.push(tile.employer);
            }
            
            if (tile.score && tile.score.trim() !== '') {
                let scoreStr = `Score: ${tile.score}`;
                if (tile.maxScore && tile.maxScore.trim() !== '') scoreStr += ` / ${tile.maxScore}`;
                cardMetaItems.push(scoreStr);
            }
            
            if (tile.date) cardMetaItems.push(tile.date);
            if (tile.location) cardMetaItems.push(tile.location);
            
            const metaInfo = cardMetaItems.join(' | ');
            const metaHTML = metaInfo ? `<p class="text-sm font-semibold mb-3 ${isDarkBg ? 'text-blue-300' : 'text-secondary'} text-left">${metaInfo}</p>` : '';

            let bannerHTML = '';
            let colSpanClass = '';
            if (tile.banner && tile.banner.trim() !== '') {
                colSpanClass = 'md:col-span-2';
                bannerHTML = getBannerHTML(tile.banner);
            }

            // Generate dynamic metrics from related tiles
            let metricsMap = {};
            if (tile.relatedTiles && tile.relatedTiles.length > 0) {
                tile.relatedTiles.forEach(relId => {
                    const path = findTilePath(relId);
                    // Ensure we do NOT count strictly hidden tiles in metrics
                    if (path && path.sub && (path.tile.visibility || 'visible') !== 'hidden') {
                        const subName = path.sub.name;
                        if (!metricsMap[subName]) metricsMap[subName] = [];
                        if (!metricsMap[subName].includes(relId)) metricsMap[subName].push(relId);
                    }
                });
            }

            let badges = '';
            const metricKeys = Object.keys(metricsMap);
            if (metricKeys.length > 0) {
                badges = metricKeys.map(key => {
                    const count = metricsMap[key].length;
                    const pillId = `${tile.id}_${key.replace(/\s+/g, '_')}`;
                    
                    let dropdownLinks = metricsMap[key].map(id => {
                        const rt = getTileById(id);
                        if(!rt) return '';
                        return `<div onclick="event.stopPropagation(); openTab('${id}'); togglePillDropdown(event, 'dropdown-${pillId}')" class="w-full text-left p-3 border-b border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-medium text-slate-700 dark:text-slate-300 transition-colors cursor-pointer truncate">${getEffectiveHeading(rt)}</div>`;
                    }).join('');

                    return `
                    <div class="relative inline-block text-left pill-dropdown-container">
                        <button onclick="togglePillDropdown(event, 'dropdown-${pillId}')" class="flex items-center gap-1.5 px-3 py-1 border border-slate-200 dark:border-slate-700 hover:border-secondary dark:hover:border-secondary transition-all rounded-full text-xs font-semibold shadow-sm bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 capitalize">
                            <span class="text-secondary dark:text-blue-400">${count}</span> <span>${key}</span> <i class="fa-solid fa-chevron-down text-[10px] ml-1 opacity-50 pointer-events-none"></i>
                        </button>
                        <div id="dropdown-${pillId}" class="pill-dropdown-content hidden absolute top-full left-0 mt-2 w-56 bg-white dark:bg-darkCard rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden z-[60] flex flex-col max-h-[40vh] overflow-y-auto">
                            ${dropdownLinks}
                        </div>
                    </div>`;
                }).join('');
            }

            return `
                <div class="flex flex-col h-full ${colSpanClass}">

        function renderTileDetailsHTML(tileId) {

                if (trimmed.toLowerCase().startsWith('<iframe')) {
                    let fixedIframe = trimmed;
                    if(!fixedIframe.includes('w-full')) fixedIframe = fixedIframe.replace('<iframe', '<iframe class="w-full h-full border-none"');
                    return `<div class="w-full aspect-video mb-4 rounded-lg overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm bg-slate-100 dark:bg-slate-900 text-left">${fixedIframe}</div>`;

                if (trimmed.match(/\.(jpeg|jpg|gif|png|webp|svg)$/i)) {
                    return `<div class="w-full mb-4 rounded-lg overflow-hidden shadow-sm bg-slate-100 dark:bg-slate-900 text-left"><img src="${trimmed}" class="w-full h-auto"></div>`;
                }

                const driveData = parseDriveLink(trimmed);
                if (driveData && driveData.id) {

            let relatedHtml = '';

            let metaItems = [];

            if (role) metaItems.push(`<span>${role}</span>`);
            if (tile.baseSubject) metaItems.push(`<span>${tile.baseSubject}</span>`);
            if (tile.specialisation) metaItems.push(`<span>${tile.specialisation}</span>`);
            if (tile.employer) {

        function toggleSettings() {

        document.addEventListener('click', (e) => {
            // Critical fix: Ignore clicks originating from elements that were just removed from the DOM 
            // (prevents dropdowns/settings from randomly closing when the UI rebuilds underneath them)
            if (!document.body.contains(e.target)) return;

            const menu = document.getElementById('settings-menu');
            const btn = document.getElementById('settings-toggle-btn');
            if (isSettingsOpen && menu && !menu.contains(e.target) && (!btn || !btn.contains(e.target))) {
                isSettingsOpen = false;
                menu.classList.add('hidden');

            const navMenu = document.getElementById('custom-nav-menu');

            // Close pill dropdowns when clicking outside
            document.querySelectorAll('.pill-dropdown-content').forEach(el => {
                if (!el.classList.contains('hidden') && !el.parentElement.contains(e.target)) {
                    el.classList.add('hidden');

        function toggleNavMenu(e, forceState) {

            const menu = document.getElementById('custom-nav-menu');
            const icon = document.getElementById('nav-dropdown-icon');
            if (!menu || !icon) return;

            isNavMenuOpen = forceState !== undefined ? forceState : !isNavMenuOpen;
            
            if (isNavMenuOpen) {
                menu.classList.remove('invisible', 'opacity-0', 'scale-95', 'pointer-events-none');

                setTimeout(() => { if(!isNavMenuOpen) menu.classList.add('invisible'); }, 200);

        function levenshtein(a, b) {
            if(a.length === 0) return b.length;
            if(b.length === 0) return a.length;
            let matrix = [];
            for(let i = 0; i <= b.length; i++){ matrix[i] = [i]; }
            for(let j = 0; j <= a.length; j++){ matrix[0][j] = j; }
            for(let i = 1; i <= b.length; i++){
                for(let j = 1; j <= a.length; j++){
                    if(b.charAt(i-1) === a.charAt(j-1)){
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function fuzzyMatch(kw, text) {
            if (!kw || !text) return false;
            if (text.includes(kw)) return true; 
            if (kw.length <= 3) return false; 
            
            const words = text.split(/[\s,.\-()]+/);
            for (let w of words) {
                if (w.length > 3 && Math.abs(w.length - kw.length) <= 2) {
                    const dist = levenshtein(kw, w);
                    if (dist <= 1 || (kw.length > 5 && dist <= 2)) return true;
                }
            }
            return false;
        }

        function handleSearch(val) {
            const resultsDiv = document.getElementById('search-results');
            if(!val.trim()) { resultsDiv.classList.add('hidden'); return; }
            
            let results = [];
            const queryWords = val.toLowerCase().split(/\s+/).filter(w => w.length > 0);
            
            appData.sections.forEach(s => {
                if ((s.visibility || 'visible') === 'hidden') return;
                s.subsections.forEach(ss => {
                    if ((ss.visibility || 'visible') === 'hidden') return;
                    ss.tiles.forEach(t => {
                        if ((t.visibility || 'visible') === 'hidden') return;
                        const searchable = [getEffectiveHeading(t), t.description, t.employer].filter(Boolean).join(' ').toLowerCase();
                        const isMatch = queryWords.some(qw => fuzzyMatch(qw, searchable));
                        if(isMatch) results.push(t);
                    });
                });
            });

            if(results.length > 0) {
                resultsDiv.innerHTML = results.map(t => `
                    <div onclick="openTab('${t.id}')" class="p-3 border-b border-slate-100 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer flex items-center gap-3 text-left">
                        <i class="fa-solid ${t.icon} text-secondary"></i>
                        <div class="overflow-hidden text-left w-full">
                            <div class="text-sm font-bold text-slate-800 dark:text-slate-200 truncate text-left w-full">${getEffectiveHeading(t)}</div>
                        </div>
                    </div>
                `).join('');
                resultsDiv.classList.remove('hidden');
            } else {
                resultsDiv.innerHTML = `<div class="p-4 text-sm text-slate-500 text-left">No matches found.</div>`;
                resultsDiv.classList.remove('hidden');
            }
        }

        function revealAndScroll(id, targetId) {
            const path = findTilePath(id);
            if (path) {
                if (path.sec && path.sec.visibility === 'archived' && !revealedArchives.includes(path.sec.id)) revealedArchives.push(path.sec.id);
                if (path.sub && path.sub.visibility === 'archived' && !revealedArchives.includes(path.sub.id)) revealedArchives.push(path.sub.id);
                if (path.tile && path.tile.visibility === 'archived' && !revealedArchives.includes(path.tile.id)) revealedArchives.push(path.tile.id);
            }
            renderApp();
            setTimeout(() => scrollToNavTarget(targetId), 100);

        function generateBotResponse(query) {
            const lowerQuery = query.toLowerCase();

            if (lowerQuery.match(/^(hi|hello|hey|greetings|start)/)) {
                return `Hello! I'm ${appData.uiText.botName.split(' ')[0]}. You can ask me about specific skills, my work experience, or how to contact me.`;
            }
            if (fuzzyMatch('contact', lowerQuery) || fuzzyMatch('email', lowerQuery) || fuzzyMatch('phone', lowerQuery) || fuzzyMatch('hire', lowerQuery)) {
                return `You can reach me via email at <a href="mailto:${appData.uiText.contactEmail}" class="text-secondary hover:underline">${appData.uiText.contactEmail}</a> or call ${appData.uiText.contactPhone}. Let's connect!`;
            }

            const stopWords = ['a', 'an', 'the', 'is', 'at', 'in', 'of', 'for', 'to', 'and', 'or', 'with', 'about', 'my', 'your', 'i', 'me', 'tell', 'what', 'where', 'how', 'do', 'you', 'have', 'know', 'can', 'show', 'any', 'please'];
            const keywords = lowerQuery.replace(/[^\w\s]/g, '').split(/\s+/).filter(w => !stopWords.includes(w) && w.length > 1);

            if (keywords.length === 0) {
                return "Could you be a bit more specific? I can tell you about my education, experience, or specific skills!";
            }

            let scoredSections = [];
            let scoredSubsections = [];
            let scoredTiles = [];

            appData.sections.forEach(sec => {
                if ((sec.visibility || 'visible') === 'hidden') return;
                
                let secScore = 0;
                keywords.forEach(kw => {
                    if (fuzzyMatch(kw, sec.name.toLowerCase())) secScore += 10;
                });
                if (secScore > 0) scoredSections.push({ sec, score: secScore });

                sec.subsections.forEach(sub => {
                    if ((sub.visibility || 'visible') === 'hidden') return;
                    let subScore = 0;
                    keywords.forEach(kw => {
                        if (fuzzyMatch(kw, sub.name.toLowerCase())) subScore += 10;
                    });
                    if (subScore > 0) scoredSubsections.push({ sec, sub, score: subScore });

                    sub.tiles.forEach(tile => {
                        if ((tile.visibility || 'visible') === 'hidden') return;
                        let score = 0;
                        const searchableText = {
                            high: [tile.heading, tile.role, tile.baseSubject, tile.specialisation, tile.employer, sec.name, sub.name].filter(Boolean).join(' ').toLowerCase(),
                            medium: (tile.description || '').toLowerCase(),
                            low: (tile.tabText || '').toLowerCase()
                        };

                        keywords.forEach(kw => {
                            if (fuzzyMatch(kw, searchableText.high)) score += 5;
                            if (fuzzyMatch(kw, searchableText.medium)) score += 3;
                            if (fuzzyMatch(kw, searchableText.low)) score += 1;
                        });

                        if (score > 0) {
                            scoredTiles.push({ tile, score });
                        }
                    });
                });
            });

            scoredSections.sort((a, b) => b.score - a.score);
            scoredSubsections.sort((a, b) => b.score - a.score);
            scoredTiles.sort((a, b) => b.score - a.score);

            const topSecScore = scoredSections.length > 0 ? scoredSections[0].score : 0;
            const topSubScore = scoredSubsections.length > 0 ? scoredSubsections[0].score : 0;
            const topTileScore = scoredTiles.length > 0 ? scoredTiles[0].score : 0;

            const maxScore = Math.max(topSecScore, topSubScore, topTileScore);

            if (maxScore === 0) {
                return `I couldn't find specific details about that in the portfolio data. Feel free to browse the categories or <a href="mailto:${appData.uiText.contactEmail}" class="text-secondary hover:underline">contact me directly</a>!`;
            }

            if (topSecScore === maxScore || topSubScore === maxScore) {
                let bestMatch = topSecScore >= topSubScore ? scoredSections[0].sec : scoredSubsections[0].sub;
                let isSec = topSecScore >= topSubScore;
                let targetId = isSec ? `nav-sec-${bestMatch.id}` : `nav-sub-${bestMatch.id}`;

                let response = `I found a category matching your query: <strong>${bestMatch.name}</strong>.`;
                response += `<div class="mt-3 flex flex-col gap-2 w-full text-left">`;
                
                response += `<button onclick="revealAndScroll('${bestMatch.id}', '${targetId}')" class="text-xs bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 px-3 py-2 rounded hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors text-left flex items-center justify-between shadow-sm"><span class="truncate pr-2 font-medium">Scroll to ${bestMatch.name}</span> <i class="fa-solid fa-arrow-turn-down"></i></button>`;

                let relevantTiles = [];
                if (isSec) {
                    bestMatch.subsections.forEach(ss => {
                        if ((ss.visibility || 'visible') === 'hidden') return;
                        ss.tiles.forEach(t => {
                            if ((t.visibility || 'visible') === 'hidden') return;
                            relevantTiles.push(t);
                        });
                    });
                } else {
                    bestMatch.tiles.forEach(t => {
                        if ((t.visibility || 'visible') === 'hidden') return;
                        relevantTiles.push(t);
                    });
                }

                relevantTiles.forEach(rt => {
                    const matchedTile = scoredTiles.find(st => st.tile.id === rt.id);
                    rt._tempScore = matchedTile ? matchedTile.score : 0;
                });
                relevantTiles.sort((a, b) => b._tempScore - a._tempScore);

                const maxButtons = Math.min(relevantTiles.length, 3);
                for(let i=0; i<maxButtons; i++){
                    response += `<button onclick="openTab('${relevantTiles[i].id}')" class="text-xs bg-blue-50 dark:bg-blue-900/30 text-secondary border border-blue-200 dark:border-blue-800 px-3 py-2 rounded hover:bg-blue-100 dark:hover:bg-blue-800 transition-colors text-left flex items-center justify-between shadow-sm"><span class="truncate pr-2 font-medium">${getEffectiveHeading(relevantTiles[i])}</span> <i class="fa-solid fa-arrow-right"></i></button>`;
                }
                
                response += `</div>`;
                return response;
            } else {
                const topMatch = scoredTiles[0].tile;
                let response = `I found some relevant information. Check out <strong>${getEffectiveHeading(topMatch)}</strong>.`;
                
                if (topMatch.description) {
                    response += `<br><br><span class="italic text-slate-500 dark:text-slate-400">"${topMatch.description.substring(0, 120)}..."</span>`;
                }

                response += `<div class="mt-3 flex flex-col gap-2 w-full text-left">`;
                const maxButtons = Math.min(scoredTiles.length, 3);
                for(let i=0; i<maxButtons; i++){
                    response += `<button onclick="openTab('${scoredTiles[i].tile.id}')" class="text-xs bg-blue-50 dark:bg-blue-900/30 text-secondary border border-blue-200 dark:border-blue-800 px-3 py-2 rounded hover:bg-blue-100 dark:hover:bg-blue-800 transition-colors text-left flex items-center justify-between shadow-sm"><span class="truncate pr-2 font-medium">${getEffectiveHeading(scoredTiles[i].tile)}</span> <i class="fa-solid fa-arrow-right"></i></button>`;
                }
                response += `</div>`;
                return response;
            }
        }

        function setupScrollSpy() {
            const container = document.getElementById('left-content');
            if(!container) return;

            container.addEventListener('scroll', () => {
                if (viewMode === 'timeline') {
                    updateBreadcrumbs(null, null);
                    return;
                }
                
                const targets = Array.from(document.querySelectorAll('.scroll-target'));
                let foundSec = null;
                let foundSub = null;

                for (let i = targets.length - 1; i >= 0; i--) {
                    const target = targets[i];
                    const rect = target.getBoundingClientRect();
                    
                    if (rect.top <= window.innerHeight / 2) {
                        if (target.id === 'top') {
                            foundSec = {id: 'top', name: 'Overview'};
                        } else if (target.classList.contains('nav-sec-container')) {
                            foundSec = {id: target.id, name: target.dataset.name};
                        } else if (target.classList.contains('nav-sub-container')) {
                            foundSub = {id: target.id, name: target.dataset.name};
                            const parentSec = document.getElementById(target.dataset.secId);
                            if (parentSec) foundSec = {id: parentSec.id, name: parentSec.dataset.name};
                        }
                        break;
                    }
                }
                
                if (!foundSec) foundSec = {id: 'top', name: 'Overview'};

                if (activeScrollSec?.id !== foundSec?.id || activeScrollSub?.id !== foundSub?.id) {
                    activeScrollSec = foundSec;
                    activeScrollSub = foundSub;
                    updateBreadcrumbs(activeScrollSec, activeScrollSub);
                }
            });
            
            setTimeout(() => container.dispatchEvent(new Event('scroll')), 100);
        }

        function setupAnimatedTitles() {
            if (titleInterval) clearInterval(titleInterval);

            const titlesArray = appData.hero.animatedTitles.split(',').map(t => t.trim()).filter(t => t);
            if (titlesArray.length === 0) return;

            container.className = "grid w-full text-left relative";
            container.innerHTML = titlesArray.map((t, i) => `
                <div class="hero-phrase col-start-1 row-start-1 w-full text-left transition-all duration-700 ease-in-out ${i === 0 ? 'opacity-100 translate-y-0 z-10' : 'opacity-0 translate-y-6 z-0 pointer-events-none'}">${t}</div>
            `).join('');

            if (titlesArray.length <= 1) return;

            let currentIndex = 0;
            const phrases = container.querySelectorAll('.hero-phrase');

            titleInterval = setInterval(() => {
                const currentEl = phrases[currentIndex];
                const nextIndex = (currentIndex + 1) % phrases.length;
                const nextEl = phrases[nextIndex];

                currentEl.classList.remove('opacity-100', 'translate-y-0', 'z-10');
                currentEl.classList.add('opacity-0', '-translate-y-6', 'z-0', 'pointer-events-none');

                nextEl.classList.remove('opacity-0', 'translate-y-6', '-translate-y-6', 'z-0', 'pointer-events-none');

                setTimeout(() => {
                    currentEl.classList.remove('-translate-y-6');

                }, 700);

                currentIndex = nextIndex;
            }, 3500); 
        }
